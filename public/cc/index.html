<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 12px 24px;
      background: #111;
      flex-shrink: 0;
    }

    button {
      background: none;
      border: none;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      padding: 4px 12px;
      border-radius: 4px;
      line-height: 1;
      transition: opacity 0.1s;
      user-select: none;
    }
    button:hover { opacity: 0.6; }
    button:disabled { opacity: 0.15; cursor: default; }

    #counter {
      font-size: 13px;
      color: #555;
      min-width: 60px;
      text-align: center;
    }

    #viewer {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #viewer img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    #viewer iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }
  </style>
</head>
<body>
  <nav>
    <button id="prev" onclick="go(-1)">&#8592;</button>
    <span id="counter"></span>
    <button id="next" onclick="go(1)">&#8594;</button>
  </nav>
  <div id="viewer"></div>

  <script>
    let files = []
    let index = 0

    function render() {
      if (!files.length) return
      const f = files[index]
      const src = encodeURIComponent(f.name)
      const viewer = document.getElementById('viewer')
      const counter = document.getElementById('counter')

      counter.textContent = `${index + 1} / ${files.length}`
      document.getElementById('prev').disabled = false
      document.getElementById('next').disabled = false

      if (f.type === 'image') {
        viewer.innerHTML = `<img src="${src}" alt="${f.name}" />`
      } else {
        viewer.innerHTML = `<iframe src="${src}"></iframe>`
      }
    }

    function go(dir) {
      index = (index + dir + files.length) % files.length
      render()
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') go(-1)
      if (e.key === 'ArrowRight') go(1)
    })

    fetch('files.json')
      .then(r => r.json())
      .then(data => { files = data; render() })
  </script>
</body>
</html>
