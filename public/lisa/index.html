<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lisa</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
      padding: 2rem;
      line-height: 1.6;
    }

    .fill {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      align-content: flex-start;
    }

    .item {
      font-size: 1.15rem;
      font-weight: 500;
      white-space: nowrap;
    }

    .item .word {
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="fill" id="fill"></div>

  <script>
    const words = [
      "brilliant ✨", "radiant 🌟", "unstoppable 💪", "amazing 🎉",
      "kind 💛", "creative 🎨", "fearless 🦁", "wonderful 🌸",
      "legendary 👑", "dazzling 💫", "warm 🤗", "sharp 🔥",
      "generous 🙌", "inspiring 🚀", "delightful 🌈", "exceptional 🏆",
      "thoughtful 💝", "magnetic ⚡", "genuine 🌻", "incredible 👏",
      "talented 🎯", "vibrant 🌺", "courageous 🦋", "brilliant 🌙",
      "joyful 😄", "powerful 💎", "compassionate 💖", "remarkable 🎊",
      "luminous ☀️", "fantastic 🎶", "bold 🌊", "graceful 🕊️",
    ];

    const fill = document.getElementById('fill');
    const target = 400;

    for (let i = 0; i < target; i++) {
      const w = words[i % words.length];
      const el = document.createElement('span');
      el.className = 'item';
      el.innerHTML = `Lisa is <span class="word">${w}</span>`;
      fill.appendChild(el);
    }
  </script>
</body>
</html>
