<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basher</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 3rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 480px;
    }

    a.card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.5rem;
      border: 1.5px solid #e5e5e5;
      border-radius: 10px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
    }

    a.card:hover {
      border-color: #111;
      background: #f9f9f9;
    }

    .card-text .label {
      font-weight: 600;
      font-size: 1rem;
    }

    .card-text .desc {
      font-size: 0.82rem;
      color: #888;
      margin-top: 0.2rem;
    }

    .arrow {
      font-size: 1.1rem;
      color: #bbb;
      flex-shrink: 0;
      margin-left: 1rem;
    }
  </style>
</head>
<body>
  <h1>Basher</h1>
  <p class="subtitle">Resources &amp; tools</p>

  <div class="links">
    <a class="card" href="MIT Biz Plan/">
      <div class="card-text">
        <div class="label">Nuts &amp; Bolts of Business Plans</div>
        <div class="desc">MIT OpenCourseWare · Sloan School of Management</div>
      </div>
      <span class="arrow">→</span>
    </a>

    <a class="card" href="MIT Financial Accounting/">
      <div class="card-text">
        <div class="label">Financial Accounting</div>
        <div class="desc">MIT OpenCourseWare · Sloan School of Management</div>
      </div>
      <span class="arrow">→</span>
    </a>

    <a class="card" href="frameworks.html">
      <div class="card-text">
        <div class="label">VC / Angel Evaluation Frameworks</div>
        <div class="desc">2×2 grid of investor evaluation models</div>
      </div>
      <span class="arrow">→</span>
    </a>
  </div>
</body>
</html>
