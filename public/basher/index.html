<!--
  basher — Business Plan Evaluation Tool
  Planned Stack: Node.js, React, Tailwind CSS, PostgreSQL, Railway
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>basher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #fafafa; color: #1a1a1a; min-height: 100vh; display: flex; flex-direction: column; align-items: center; -webkit-font-smoothing: antialiased; }
    .container { width: 100%; max-width: 480px; padding: 0 24px; display: flex; flex-direction: column; align-items: center; }
    .title { margin-top: 80px; font-size: 11px; font-weight: 400; letter-spacing: 0.12em; text-transform: lowercase; color: #999; }
    .dropzone-wrapper { margin-top: 32px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .dropzone { width: 96px; height: 96px; border-radius: 50%; border: 1.5px dashed #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.25s ease; background: transparent; }
    .dropzone:hover { border-color: #999; background: rgba(0,0,0,0.015); }
    .dropzone.drag-over { border-color: #1a1a1a; border-style: solid; background: rgba(0,0,0,0.03); transform: scale(1.06); }
    .dropzone.has-file { border-color: #2a9d6a; border-style: solid; }
    .dropzone-icon { font-size: 24px; color: #bbb; transition: color 0.25s ease; line-height: 1; user-select: none; }
    .dropzone:hover .dropzone-icon { color: #888; }
    .dropzone.drag-over .dropzone-icon { color: #1a1a1a; }
    .dropzone.has-file .dropzone-icon { color: #2a9d6a; }
    .dropzone-label { font-size: 11px; color: #aaa; font-weight: 400; }
    .file-info { margin-top: 8px; font-size: 12px; color: #666; text-align: center; min-height: 18px; transition: opacity 0.2s ease; }
    .file-info.visible { opacity: 1; } .file-info:not(.visible) { opacity: 0; }
    .file-input { display: none; }
    nav { margin-top: 64px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
    nav a { font-size: 13px; font-weight: 400; color: #888; text-decoration: none; transition: color 0.2s ease; padding: 4px 0; }
    nav a:hover { color: #1a1a1a; }
    .footer { margin-top: auto; padding: 48px 0 32px; font-size: 10px; color: #ccc; letter-spacing: 0.04em; }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">basher</div>
    <div class="dropzone-wrapper">
      <div class="dropzone" id="dropzone" tabindex="0" role="button" aria-label="Drop a business plan here">
        <span class="dropzone-icon" id="dropzone-icon">+</span>
      </div>
      <div class="dropzone-label">drop a business plan</div>
      <div class="file-info" id="file-info"></div>
    </div>
    <input type="file" class="file-input" id="file-input" accept=".pdf,.docx,.doc,.txt,.rtf">
    <nav>
      <a href="frameworks.html">frameworks</a>
    </nav>
  </div>
  <div class="footer">node · react · tailwind · postgres · railway</div>
  <script>
    const dropzone=document.getElementById('dropzone'),dropzoneIcon=document.getElementById('dropzone-icon'),fileInput=document.getElementById('file-input'),fileInfo=document.getElementById('file-info');
    const ACCEPTED=['application/pdf','application/msword','application/vnd.openxmlformats-officedocument.wordprocessingml.document','text/plain','application/rtf'];
    function handleFile(f){if(!f)return;const ext=f.name.split('.').pop().toLowerCase();if(!ACCEPTED.includes(f.type)&&!['pdf','docx','doc','txt','rtf'].includes(ext)){fileInfo.textContent='pdf, docx, or txt only';fileInfo.classList.add('visible');setTimeout(()=>fileInfo.classList.remove('visible'),2600);return;}dropzone.classList.add('has-file');dropzoneIcon.textContent='✓';fileInfo.textContent=f.name;fileInfo.classList.add('visible');}
    dropzone.addEventListener('click',()=>{if(dropzone.classList.contains('has-file')){dropzone.classList.remove('has-file');dropzoneIcon.textContent='+';fileInfo.classList.remove('visible');return;}fileInput.click();});
    dropzone.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();dropzone.click();}});
    fileInput.addEventListener('change',e=>{if(e.target.files.length>0)handleFile(e.target.files[0]);});
    dropzone.addEventListener('dragenter',e=>{e.preventDefault();dropzone.classList.add('drag-over');});
    dropzone.addEventListener('dragover',e=>{e.preventDefault();dropzone.classList.add('drag-over');});
    dropzone.addEventListener('dragleave',e=>{e.preventDefault();dropzone.classList.remove('drag-over');});
    dropzone.addEventListener('drop',e=>{e.preventDefault();dropzone.classList.remove('drag-over');if(e.dataTransfer.files.length>0)handleFile(e.dataTransfer.files[0]);});
    document.addEventListener('dragover',e=>e.preventDefault());document.addEventListener('drop',e=>e.preventDefault());
  </script>
</body>
</html>
