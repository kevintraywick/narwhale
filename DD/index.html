<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>D&amp;D</title>
  <style>
    :root {
      --bg: #2a3140;
      --surface: #231f1c;
      --border: #3d3530;
      --accent: #c0392b;
      --gold: #c9a84c;
      --text: #e8ddd0;
      --muted: #8a7d6e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', serif;
      min-height: 100vh;
      padding: 0;
      max-width: 860px;
      margin: 0 auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    h1 { font-size: 2rem; color: var(--gold); letter-spacing: 0.08em; }
    .subtitle { color: var(--muted); font-size: 0.85rem; margin-top: 0.2rem; }
    nav { display: flex; gap: 0.75rem; margin-bottom: 2rem; }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      padding: 0.35rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      transition: color 0.15s, border-color 0.15s;
    }
    nav a:hover, nav a.active { color: var(--gold); border-color: var(--gold); }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
    }
    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.45rem 1.1rem;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      text-decoration: none;
      text-align: center;
      display: inline-block;
    }
    .btn:hover { opacity: 0.85; }
    .sess-item { display: flex; align-items: center; gap: 0.3rem; }
    .session-btn {
      background: rgba(192,57,43,0.55);
      color: #fff;
      border: none;
      padding: 0.35rem 0.9rem;
      border-radius: 4px;
      cursor: grab;
      font-family: inherit;
      font-size: 0.8rem;
      text-decoration: none;
      text-align: left;
      display: block;
      white-space: nowrap;
      flex: 1;
    }
    .session-btn:hover { background: rgba(192,57,43,0.85); }
    .sess-del {
      background: none;
      border: none;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0.2rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .sess-del:hover { color: #fff; }
    .list { display: flex; flex-direction: column; gap: 0.5rem; }
    .card {
      display: flex;
      align-items: center;
      padding: 0.9rem 1.1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      text-decoration: none;
      color: var(--text);
      gap: 1rem;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: var(--gold); }
    .card-num { font-size: 0.8rem; color: var(--muted); min-width: 3rem; }
    .card-title { flex: 1; }
    .card-meta { font-size: 0.8rem; color: var(--muted); }
    .del-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0.2rem 0.4rem;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }
    .card:hover .del-btn { opacity: 1; }
    .del-btn:hover { color: var(--accent); }
    .empty { text-align: center; padding: 3rem; color: var(--muted); font-style: italic; }
  </style>
</head>
<body>
  <header style="width:100vw;height:138vh;position:relative;left:50%;right:50%;margin-left:-50vw;margin-right:-50vw;background:#2a3140;overflow:hidden;margin-bottom:2rem;">
    <img src="SOTW_splash.png" alt="Secrets of the Wilds" style="width:100%;height:100%;object-fit:contain;object-position:center top;display:block;transform:translateY(-50px);">
    <nav style="position:absolute;top:1rem;left:1rem;display:flex;flex-direction:column;gap:0.5rem;max-height:calc(100% - 2rem);overflow-y:auto;">
      <button class="btn" onclick="newSession()" style="margin-bottom:20px;">+ New Session</button>
      <a href="index.html" class="btn">Sessions</a>
      <div id="session-list" style="display:flex;flex-direction:column;gap:0.35rem;margin-top:0.25rem;padding-left:20px;"></div>
      <a href="/DD/npcs/" class="btn">NPCs</a>
      <a href="players/players.html" class="btn">Players</a>
      <a href="maps/" class="btn">Maps</a>
    </nav>
  </header>


  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script>
    const API = '/DD/api.php?key=sessions';

    async function load() {
      try { const r = await fetch(API); return r.ok ? r.json() : []; }
      catch { return []; }
    }

    async function save(data) {
      await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
    }

    async function render() {
      const sessions = await load(); // preserve saved order
      const list = document.getElementById('session-list');
      list.innerHTML = '';
      sessions.forEach(s => {
        const div = document.createElement('div');
        div.className = 'sess-item';
        div.dataset.id = s.id;
        const a = document.createElement('a');
        a.className = 'session-btn';
        a.href = `session.html?id=${s.id}`;
        a.textContent = s.title || 'Untitled';
        const del = document.createElement('button');
        del.className = 'sess-del';
        del.textContent = '×';
        del.addEventListener('click', async () => {
          if (confirm(`Delete "${s.title || 'Untitled'}"?`)) {
            await save((await load()).filter(x => x.id !== s.id));
            render();
          }
        });
        div.appendChild(a);
        div.appendChild(del);
        list.appendChild(div);
      });

      Sortable.create(list, {
        animation: 120,
        delay: 200,
        delayOnTouchOnly: true,
        onEnd: async () => {
          const ids = [...list.querySelectorAll('.sess-item')].map(el => el.dataset.id);
          const all = await load();
          const reordered = ids.map(id => all.find(s => s.id === id)).filter(Boolean);
          all.forEach(s => { if (!reordered.find(r => r.id === s.id)) reordered.push(s); });
          await save(reordered);
        }
      });
    }

    async function newSession() {
      const sessions = await load();
      const max = sessions.reduce((m, s) => Math.max(m, s.number), 0);
      const id = Date.now().toString(36);
      sessions.push({
        id, number: max + 1, title: '', date: '',
        goal: '', scenes: '', npcs: '', locations: '',
        looseEnds: '', notes: '',
        lastModified: Date.now()
      });
      await save(sessions);
      location.href = `session.html?id=${id}`;
    }

    render();
  </script>
</body>
</html>
