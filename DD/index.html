<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>D&amp;D</title>
  <link rel="stylesheet" href="/DD/strip.css" />
  <style>
    :root {
      --bg: #2a3140;
      --surface: #231f1c;
      --border: #3d3530;
      --accent: #8b1a1a;
      --gold: #c9a84c;
      --text: #e8ddd0;
      --muted: #8a7d6e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', serif;
      min-height: 100vh;
      padding: 0;
      max-width: 860px;
      margin: 0 auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    h1 { font-size: 2rem; color: var(--gold); letter-spacing: 0.08em; }
    .subtitle { color: var(--muted); font-size: 0.85rem; margin-top: 0.2rem; }
    nav { display: flex; gap: 0.75rem; margin-bottom: 2rem; }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      padding: 0.35rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      transition: color 0.15s, border-color 0.15s;
    }
    nav a:hover, nav a.active { color: var(--gold); border-color: var(--gold); }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
    }
    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.45rem 1.1rem;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      text-decoration: none;
      text-align: center;
      display: inline-block;
    }
    .btn:hover { opacity: 0.85; }
    .sess-item { display: flex; align-items: center; gap: 0.3rem; }
    .session-btn {
      background: rgba(139,26,26,0.55);
      color: #fff;
      border: none;
      padding: 0.35rem 0.9rem;
      border-radius: 4px;
      cursor: grab;
      font-family: inherit;
      font-size: 0.8rem;
      text-decoration: none;
      text-align: left;
      display: block;
      white-space: nowrap;
      flex: 1;
    }
    .session-btn:hover { background: rgba(139,26,26,0.85); }
    .sess-del {
      background: none;
      border: none;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0.2rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .sess-del:hover { color: #fff; }
    .list { display: flex; flex-direction: column; gap: 0.5rem; }
    .card {
      display: flex;
      align-items: center;
      padding: 0.9rem 1.1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      text-decoration: none;
      color: var(--text);
      gap: 1rem;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: var(--gold); }
    .card-num { font-size: 0.8rem; color: var(--muted); min-width: 3rem; }
    .card-title { flex: 1; }
    .card-meta { font-size: 0.8rem; color: var(--muted); }
    .del-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0.2rem 0.4rem;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }
    .card:hover .del-btn { opacity: 1; }
    .del-btn:hover { color: var(--accent); }
    .empty { text-align: center; padding: 3rem; color: var(--muted); font-style: italic; }
  </style>
</head>
<body>
  <header style="width:100vw;height:138vh;position:relative;left:50%;right:50%;margin-left:-50vw;margin-right:-50vw;background:#2a3140;overflow:hidden;margin-bottom:2rem;">
    <img src="SOTW_splash.png" alt="Shadow of the Wolf campaign splash art" style="width:100%;height:100%;object-fit:contain;object-position:center top;display:block;transform:translateY(-50px);">
    <nav style="position:absolute;top:1rem;left:1rem;display:flex;flex-direction:column;gap:0.5rem;max-height:calc(100% - 2rem);overflow-y:auto;">
      <button class="btn" onclick="newSession()" style="margin-bottom:20px;background:#6b7d8e;">+ New Session</button>
      <a href="index.html" class="btn">Sessions</a>
      <div id="session-list" style="display:flex;flex-direction:column;gap:0.35rem;margin-top:0.25rem;padding-left:20px;"></div>
      <a href="players/players.html" class="btn" style="margin-top:20px;" onclick="playHowl()">Players</a>
      <a href="/DD/npcs/" class="btn" style="margin-top:4px;">NPCs</a>
      <a href="maps/" class="btn" style="margin-top:4px;">Maps</a>
      <a href="magic/" class="btn" style="margin-top:4px;">Magic</a>
      <a href="marketplace.html" class="btn" style="margin-top:4px;">Marketplace</a>
      <!-- Player circles — click to go to your character sheet -->
      <div style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:16px;padding-left:4px;">
        <a href="players/players.html?id=levi" onclick="pickPlayer('levi')" style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:3px;">
          <div style="width:48px;height:48px;border-radius:50%;overflow:hidden;border:2px solid #3d3530;background:#2e2825;display:flex;align-items:center;justify-content:center;position:relative;">
            <span style="color:#8a7d6e;font-size:1rem;">L</span>
            <img src="players/images/levi.png" loading="lazy" onerror="this.remove()" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">
          </div>
          <span style="font-size:0.55rem;color:#8a7d6e;text-transform:uppercase;letter-spacing:0.08em;">Garrick</span>
        </a>
        <a href="players/players.html?id=jeanette" onclick="pickPlayer('jeanette')" style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:3px;">
          <div style="width:48px;height:48px;border-radius:50%;overflow:hidden;border:2px solid #3d3530;background:#2e2825;display:flex;align-items:center;justify-content:center;position:relative;">
            <span style="color:#8a7d6e;font-size:1rem;">J</span>
            <img src="players/images/jeanette.png" loading="lazy" onerror="this.remove()" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">
          </div>
          <span style="font-size:0.55rem;color:#8a7d6e;text-transform:uppercase;letter-spacing:0.08em;">Eleil</span>
        </a>
        <a href="players/players.html?id=nicole" onclick="pickPlayer('nicole')" style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:3px;">
          <div style="width:48px;height:48px;border-radius:50%;overflow:hidden;border:2px solid #3d3530;background:#2e2825;display:flex;align-items:center;justify-content:center;position:relative;">
            <span style="color:#8a7d6e;font-size:1rem;">N</span>
            <img src="players/images/nicole.png" loading="lazy" onerror="this.remove()" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">
          </div>
          <span style="font-size:0.55rem;color:#8a7d6e;text-transform:uppercase;letter-spacing:0.08em;">HollyGo</span>
        </a>
        <a href="players/players.html?id=katie" onclick="pickPlayer('katie')" style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:3px;">
          <div style="width:48px;height:48px;border-radius:50%;overflow:hidden;border:2px solid #3d3530;background:#2e2825;display:flex;align-items:center;justify-content:center;position:relative;">
            <span style="color:#8a7d6e;font-size:1rem;">K</span>
            <img src="players/images/katie.png" loading="lazy" onerror="this.remove()" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">
          </div>
          <span style="font-size:0.55rem;color:#8a7d6e;text-transform:uppercase;letter-spacing:0.08em;">Lysandra</span>
        </a>
        <a href="players/players.html?id=brandon" onclick="pickPlayer('brandon')" style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:3px;">
          <div style="width:48px;height:48px;border-radius:50%;overflow:hidden;border:2px solid #3d3530;background:#2e2825;display:flex;align-items:center;justify-content:center;position:relative;">
            <span style="color:#8a7d6e;font-size:1rem;">B</span>
            <img src="players/images/brandon.png" loading="lazy" onerror="this.remove()" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">
          </div>
          <span style="font-size:0.55rem;color:#8a7d6e;text-transform:uppercase;letter-spacing:0.08em;">Vaoker</span>
        </a>
        <a href="players/players.html?id=ashton" onclick="pickPlayer('ashton')" style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:3px;">
          <div style="width:48px;height:48px;border-radius:50%;overflow:hidden;border:2px solid #3d3530;background:#2e2825;display:flex;align-items:center;justify-content:center;position:relative;">
            <span style="color:#8a7d6e;font-size:1rem;">A</span>
            <img src="players/images/ashton.png" loading="lazy" onerror="this.remove()" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">
          </div>
          <span style="font-size:0.55rem;color:#8a7d6e;text-transform:uppercase;letter-spacing:0.08em;">Ash</span>
        </a>
      </div>
      <audio id="howl" src="audio/wolf-howl.mp3" preload="auto"></audio>
    </nav>
  </header>

  <div class="sess-strip" id="sess-strip"></div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="/DD/strip.js"></script>
  <script>
    const API = '/DD/api.php?key=sessions';

    async function load() {
      try { const r = await fetch(API); return r.ok ? r.json() : []; }
      catch { return []; }
    }

    async function save(data) {
      await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
    }

    async function render() {
      const sessions = await load(); // preserve saved order
      const list = document.getElementById('session-list');
      list.innerHTML = '';
      sessions.forEach(s => {
        const div = document.createElement('div');
        div.className = 'sess-item';
        div.dataset.id = s.id;
        const a = document.createElement('a');
        a.className = 'session-btn';
        a.href = `session.html?id=${s.id}`;
        a.textContent = s.title || 'Untitled';
        const del = document.createElement('button');
        del.className = 'sess-del';
        del.textContent = '×';
        del.addEventListener('click', async () => {
          if (confirm(`Delete "${s.title || 'Untitled'}"?`)) {
            await save((await load()).filter(x => x.id !== s.id));
            render();
          }
        });
        div.appendChild(a);
        div.appendChild(del);
        list.appendChild(div);
      });

      Sortable.create(list, {
        animation: 120,
        delay: 200,
        delayOnTouchOnly: true,
        onEnd: async () => {
          const ids = [...list.querySelectorAll('.sess-item')].map(el => el.dataset.id);
          const all = await load();
          const reordered = ids.map(id => all.find(s => s.id === id)).filter(Boolean);
          all.forEach(s => { if (!reordered.find(r => r.id === s.id)) reordered.push(s); });
          await save(reordered);
        }
      });
    }

    async function newSession() {
      const sessions = await load();
      const max = sessions.reduce((m, s) => Math.max(m, s.number), 0);
      const id = Date.now().toString(36);
      sessions.push({
        id, number: max + 1, title: '', date: '',
        goal: '', scenes: '', npcs: '', locations: '',
        looseEnds: '', notes: '',
        lastModified: Date.now()
      });
      await save(sessions);
      location.href = `session.html?id=${id}`;
    }

    /* Store the selected player so the Marketplace page can
       auto-select them when they navigate there */
    function pickPlayer(id) {
      try { sessionStorage.setItem('dd-active-player', id); } catch {}
    }

    function playHowl() {
      const a = document.getElementById('howl');
      a.currentTime = 0;
      a.play();
    }

    render();

  </script>
</body>
</html>
