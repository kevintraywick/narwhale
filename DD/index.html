<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>D&amp;D</title>
  <style>
    :root {
      --bg: #1a1614;
      --surface: #231f1c;
      --border: #3d3530;
      --accent: #c0392b;
      --gold: #c9a84c;
      --text: #e8ddd0;
      --muted: #8a7d6e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', serif;
      min-height: 100vh;
      padding: 2rem;
      max-width: 860px;
      margin: 0 auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    h1 { font-size: 2rem; color: var(--gold); letter-spacing: 0.08em; }
    .subtitle { color: var(--muted); font-size: 0.85rem; margin-top: 0.2rem; }
    nav { display: flex; gap: 0.75rem; margin-bottom: 2rem; }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      padding: 0.35rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      transition: color 0.15s, border-color 0.15s;
    }
    nav a:hover, nav a.active { color: var(--gold); border-color: var(--gold); }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
    }
    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.45rem 1.1rem;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
    }
    .btn:hover { opacity: 0.85; }
    .list { display: flex; flex-direction: column; gap: 0.5rem; }
    .card {
      display: flex;
      align-items: center;
      padding: 0.9rem 1.1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      text-decoration: none;
      color: var(--text);
      gap: 1rem;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: var(--gold); }
    .card-num { font-size: 0.8rem; color: var(--muted); min-width: 3rem; }
    .card-title { flex: 1; }
    .card-meta { font-size: 0.8rem; color: var(--muted); }
    .del-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0.2rem 0.4rem;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }
    .card:hover .del-btn { opacity: 1; }
    .del-btn:hover { color: var(--accent); }
    .empty { text-align: center; padding: 3rem; color: var(--muted); font-style: italic; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>⚔ D&amp;D</h1>
      <div class="subtitle">DM Prep</div>
    </div>
  </header>

  <nav>
    <a href="index.html" class="active">Sessions</a>
    <a href="npcs.html">NPCs</a>
    <a href="party.html">Party</a>
  </nav>

  <div class="section-header">
    <span class="label">Sessions</span>
    <button class="btn" onclick="newSession()">+ New Session</button>
  </div>

  <div class="list" id="list">
    <div class="empty" id="empty">No sessions yet.</div>
  </div>

  <script>
    const KEY = 'dd_sessions';

    function load() {
      try { return JSON.parse(localStorage.getItem(KEY) || '[]'); }
      catch { return []; }
    }

    function save(data) {
      try { localStorage.setItem(KEY, JSON.stringify(data)); } catch {}
    }

    function render() {
      const sessions = load().sort((a, b) => b.number - a.number);
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      list.querySelectorAll('.card').forEach(el => el.remove());
      empty.style.display = sessions.length ? 'none' : 'block';
      sessions.forEach(s => {
        const a = document.createElement('a');
        a.className = 'card';
        a.href = `session.html?id=${s.id}`;
        a.innerHTML = `
          <span class="card-num">#${s.number}</span>
          <span class="card-title">${s.title || '<em style="color:var(--muted)">Untitled</em>'}</span>
          <span class="card-meta">${s.date || ''}</span>
          <button class="del-btn" title="Delete" data-id="${s.id}">✕</button>
        `;
        a.querySelector('.del-btn').addEventListener('click', e => {
          e.preventDefault();
          if (confirm(`Delete session #${s.number}?`)) {
            save(load().filter(x => x.id !== s.id));
            render();
          }
        });
        list.appendChild(a);
      });
    }

    function newSession() {
      const sessions = load();
      const max = sessions.reduce((m, s) => Math.max(m, s.number), 0);
      const id = Date.now().toString(36);
      sessions.push({
        id, number: max + 1, title: '', date: '',
        goal: '', scenes: '', npcs: '', locations: '',
        encounters: '', looseEnds: '', notes: '',
        lastModified: Date.now()
      });
      save(sessions);
      location.href = `session.html?id=${id}`;
    }

    render();
  </script>
</body>
</html>
