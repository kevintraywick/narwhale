<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maps</title>
    <style>
        :root {
            --bg: #1a1614;
            --surface: #231f1c;
            --border: #3d3530;
            --gold: #c9a84c;
            --accent: #8b1a1a;
            --text: #e8ddd0;
            --muted: #8a7d6e;
            --green: #5a8a5a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            font-family: 'Georgia', serif;
            min-height: 100vh;
            color: var(--text);
        }

        /* ── Nav ── */
        .dd-nav {
            display: flex;
            gap: 0.75rem;
            padding: 0.75rem 1.25rem;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .dd-nav a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0.3rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            transition: color 0.15s, border-color 0.15s;
        }
        .dd-nav a:hover, .dd-nav a.active { color: var(--gold); border-color: var(--gold); }

        /* ── Tab rows (shared style for both session + image tabs) ── */
        .tab-row {
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            padding: 0.35rem 1.25rem;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tab-row::-webkit-scrollbar { display: none; }
        .tab-row.surface { background: var(--surface); }
        .tab-row.hidden { display: none; }
        .tab-list { display: flex; gap: 0.4rem; flex-wrap: nowrap; }
        .tab-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--muted);
            font-family: inherit;
            font-size: 0.75rem;
            padding: 0.2rem 0.55rem;
            border-radius: 3px;
            cursor: pointer;
            white-space: nowrap;
            transition: color 0.15s, border-color 0.15s;
            flex-shrink: 0;
        }
        .tab-btn:hover { color: var(--gold); border-color: var(--border); }
        .tab-btn.active { color: var(--gold); border-color: var(--gold); }

        /* ── Map image panel (top third) ── */
        .map-img-panel {
            height: 33vh;
            background: #0d0b09;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border);
            overflow: hidden;
        }
        .map-img-panel img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .map-img-empty {
            color: var(--muted);
            font-size: 0.85rem;
            font-style: italic;
        }

        /* ── 4 notes boxes ── */
        .boxes-wrap {
            max-width: 860px;
            margin: 1.5rem auto;
            padding: 0 1rem 4rem;
        }
        .boxes-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }
        .map-box {
            background: var(--surface);
            padding: 0.75rem 0.9rem;
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        .map-box:nth-child(even) { border-right: none; }
        .map-box:nth-last-child(-n+2) { border-bottom: none; }
        .box-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.13em;
            color: var(--muted);
            margin-bottom: 0.4rem;
        }
        .map-box textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: 'Georgia', serif;
            font-size: 0.88rem;
            line-height: 1.55;
            resize: none;
            outline: none;
            min-height: 150px;
        }
        .map-box textarea::placeholder { color: #4a403a; }

        .empty { text-align: center; padding: 3rem; color: var(--muted); font-style: italic; }

        /* ── Save bar ── */
        .save-bar {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            font-size: 0.78rem;
            color: var(--muted);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.35rem 0.75rem;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }
        .save-bar.visible { opacity: 1; }
        .save-bar.saved { color: var(--green); }
    </style>
</head>
<body>

<nav class="dd-nav">
    <a href="/DD/index.html">Sessions</a>
    <a href="/DD/npcs/">NPCs</a>
    <a href="/DD/players/players.html">Players</a>
    <a href="/DD/maps/" class="active">Maps</a>
    <a href="/DD/magic/">Magic</a>
</nav>

<!-- Row 2: Session tabs -->
<div class="tab-row" id="sess-tabs-wrap">
    <div class="tab-list" id="sess-tabs"></div>
</div>

<!-- Row 3: Image tabs — only shown when 2+ images exist for the session -->
<div class="tab-row surface hidden" id="img-tabs-wrap">
    <div class="tab-list" id="img-tabs"></div>
</div>

<!-- Full-width map image -->
<div class="map-img-panel" id="map-img-panel">
    <span class="map-img-empty" id="map-img-empty">No map image</span>
    <img id="map-img" src="" alt="Map" style="display:none;" loading="lazy">
</div>

<!-- 4 notes boxes -->
<div class="boxes-wrap" id="boxes-wrap" style="display:none;">
    <div class="boxes-grid">
        <div class="map-box">
            <div class="box-label">NPCs</div>
            <textarea id="f-npcs" placeholder="NPCs in this area…"></textarea>
        </div>
        <div class="map-box">
            <div class="box-label">Traps</div>
            <textarea id="f-traps" placeholder="Traps, hazards, alarms…"></textarea>
        </div>
        <div class="map-box">
            <div class="box-label">Treasures</div>
            <textarea id="f-treasures" placeholder="Loot, hidden items, rewards…"></textarea>
        </div>
        <div class="map-box">
            <div class="box-label">Notes</div>
            <textarea id="f-notes" placeholder="Atmosphere, tactics, misc…"></textarea>
        </div>
    </div>
</div>

<div class="empty" id="map-empty" style="display:none;">No sessions yet.</div>

<div class="save-bar" id="save-bar">saved</div>

<script>
    const SESS_API = '/DD/api.php?key=sessions';
    const MAPS_API = '/DD/api.php?key=maps';

    let sessions = [];
    let mapsData = {};
    let sessFolders = {};
    let currentId = null;
    let currentImages = [];
    let saveTimer;

    async function loadSessions() {
        try { const r = await fetch(SESS_API); return r.ok ? r.json() : []; } catch { return []; }
    }
    async function loadMaps() {
        try {
            const r = await fetch(MAPS_API);
            if (!r.ok) return {};
            const d = await r.json();
            // Guard against old array format or missing file (api returns [] by default)
            return (d && typeof d === 'object' && !Array.isArray(d)) ? d : {};
        } catch { return {}; }
    }
    async function loadMapFiles(folder) {
        if (!folder) return [];
        try {
            const r = await fetch(`/DD/api.php?action=mapfiles&folder=${encodeURIComponent(folder)}`);
            if (!r.ok) return [];
            const obj = await r.json(); // e.g. {1: "1.jpg", 2: "2.jpeg"}
            return Object.entries(obj)
                .sort((a, b) => parseInt(a[0]) - parseInt(b[0]))
                .map(([, filename]) => filename);
        } catch { return []; }
    }

    function saveMaps() {
        const bar = document.getElementById('save-bar');
        bar.textContent = 'saving…'; bar.className = 'save-bar visible';
        clearTimeout(saveTimer);
        saveTimer = setTimeout(async () => {
            await fetch(MAPS_API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(mapsData) });
            bar.textContent = 'saved'; bar.className = 'save-bar visible saved';
            setTimeout(() => { bar.className = 'save-bar'; }, 1500);
        }, 600);
    }

    function getOrInit(id) {
        // Initialise (or reset from old array format) to new flat object shape
        if (!mapsData[id] || Array.isArray(mapsData[id])) {
            mapsData[id] = { npcs: '', traps: '', treasures: '', notes: '' };
        }
        return mapsData[id];
    }

    function showImage(folder, images, idx) {
        const img = document.getElementById('map-img');
        const empty = document.getElementById('map-img-empty');
        if (!folder || images.length === 0) {
            img.style.display = 'none';
            empty.style.display = '';
        } else {
            const filename = images[idx] || images[0];
            img.src = `/DD/maps/${folder}/${filename}`;
            img.alt = filename;
            img.style.display = 'block';
            empty.style.display = 'none';
        }
    }

    function renderImgTabs(folder, images) {
        const wrap = document.getElementById('img-tabs-wrap');
        const tabs = document.getElementById('img-tabs');
        tabs.innerHTML = '';
        if (images.length < 2) { wrap.classList.add('hidden'); return; }
        wrap.classList.remove('hidden');
        images.forEach((filename, idx) => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn' + (idx === 0 ? ' active' : '');
            btn.textContent = filename;
            btn.onclick = () => {
                tabs.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
                showImage(folder, images, idx);
            };
            tabs.appendChild(btn);
        });
    }

    async function selectSession(id) {
        currentId = id;
        document.querySelectorAll('#sess-tabs .tab-btn').forEach(t => t.classList.remove('active'));
        document.querySelector(`#sess-tabs .tab-btn[data-id="${id}"]`).classList.add('active');

        const data = getOrInit(id);
        const folder = sessFolders[id];
        const images = await loadMapFiles(folder);
        currentImages = images;

        // Populate boxes
        document.getElementById('f-npcs').value = data.npcs || '';
        document.getElementById('f-traps').value = data.traps || '';
        document.getElementById('f-treasures').value = data.treasures || '';
        document.getElementById('f-notes').value = data.notes || '';
        document.getElementById('boxes-wrap').style.display = '';

        showImage(folder, images, 0);
        renderImgTabs(folder, images);
    }

    // Wire up autosave for the 4 textareas
    ['npcs', 'traps', 'treasures', 'notes'].forEach(field => {
        document.getElementById(`f-${field}`).addEventListener('input', e => {
            if (!currentId) return;
            getOrInit(currentId)[field] = e.target.value;
            saveMaps();
        });
    });

    (async () => {
        [sessions, mapsData] = await Promise.all([loadSessions(), loadMaps()]);
        const tabs = document.getElementById('sess-tabs');
        const empty = document.getElementById('map-empty');

        if (sessions.length === 0) {
            document.getElementById('map-img-panel').style.display = 'none';
            empty.style.display = 'block';
            return;
        }

        sessions.forEach(s => {
            sessFolders[s.id] = s.mapFolder || '';
            const btn = document.createElement('button');
            btn.className = 'tab-btn';
            btn.dataset.id = s.id;
            btn.textContent = s.title || `Session ${s.number}`;
            btn.onclick = () => selectSession(s.id);
            tabs.appendChild(btn);
        });

        selectSession(sessions[0].id);
    })();
</script>

</body>
</html>
