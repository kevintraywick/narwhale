<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace</title>
    <link rel="stylesheet" href="/DD/strip.css" />
    <style>
        :root {
            --bg: #1a1614;
            --surface: #231f1c;
            --border: #3d3530;
            --gold: #c9a84c;
            --accent: #8b1a1a;
            --text: #e8ddd0;
            --muted: #8a7d6e;
            --green: #5a8a5a;
            --potion-color: #6a8a4a;
            --scroll-color: #4a7a9a;
            --gear-color: #9a7a3a;
            --weapon-color: #8a3a3a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            font-family: 'Georgia', serif;
            min-height: 100vh;
            color: var(--text);
        }

        /* ── Nav ── */
        .dd-nav {
            display: flex;
            gap: 0.75rem;
            padding: 0.75rem 1.25rem;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }
        .dd-nav a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0.3rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            transition: color 0.15s, border-color 0.15s;
        }
        .dd-nav a:hover { color: var(--gold); border-color: var(--gold); }

        /* ── Welcome banner ── */
        .welcome {
            text-align: center;
            padding: 2.5rem 1rem 1.5rem;
        }
        .welcome h1 {
            font-size: 1.6rem;
            color: var(--gold);
            letter-spacing: 0.06em;
            margin-bottom: 0.6rem;
        }
        .welcome p {
            color: var(--muted);
            font-size: 0.95rem;
        }

        /* ── Player selection circles ── */
        .player-select {
            display: flex;
            justify-content: center;
            gap: 1.25rem;
            padding: 1rem 1rem 2rem;
            flex-wrap: wrap;
        }

        .p-circle {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .p-circle:hover { transform: scale(1.08); }

        .p-circle-img {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--border);
            background: #2e2825;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .p-circle-img img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .p-circle-initials {
            font-size: 1.4rem;
            color: var(--muted);
            user-select: none;
        }
        .p-circle-name {
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.2s;
        }

        /* Pulsing glow animation for unselected state */
        .awaiting .p-circle-img {
            animation: pulse-glow 2s ease-in-out infinite;
        }
        .awaiting .p-circle:nth-child(2) .p-circle-img { animation-delay: 0.33s; }
        .awaiting .p-circle:nth-child(3) .p-circle-img { animation-delay: 0.66s; }
        .awaiting .p-circle:nth-child(4) .p-circle-img { animation-delay: 1s; }
        .awaiting .p-circle:nth-child(5) .p-circle-img { animation-delay: 1.33s; }
        .awaiting .p-circle:nth-child(6) .p-circle-img { animation-delay: 1.66s; }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 6px rgba(201,168,76,0.2); border-color: var(--border); }
            50% { box-shadow: 0 0 18px rgba(201,168,76,0.55); border-color: var(--gold); }
        }

        /* Selected player highlight */
        .p-circle.active .p-circle-img {
            border-color: var(--gold);
            box-shadow: 0 0 0 2px var(--gold);
            animation: none;
        }
        .p-circle.active .p-circle-name { color: var(--gold); }

        /* ── Main marketplace (hidden until player selected) ── */
        .market-main {
            display: none;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 1rem 4rem;
        }
        .market-main.visible { display: block; }

        /* Active player bar */
        .active-bar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.65rem 1rem;
            margin-bottom: 1.25rem;
        }
        .active-bar-img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--gold);
            background: #2e2825;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
        }
        .active-bar-img img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .active-bar-name {
            font-size: 1rem;
            color: var(--gold);
            font-weight: bold;
        }
        .active-bar-gold {
            margin-left: auto;
            font-size: 0.9rem;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .gold-icon { font-size: 1rem; }
        .change-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: inherit;
            font-size: 0.75rem;
            padding: 0.25rem 0.6rem;
            border-radius: 3px;
            cursor: pointer;
            margin-left: 0.75rem;
            transition: color 0.15s, border-color 0.15s;
        }
        .change-btn:hover { color: var(--gold); border-color: var(--gold); }

        /* ── Section headings ── */
        .section-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.13em;
            color: var(--muted);
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* ── Item circles (shared style for market + player inventories) ── */
        .item-grid {
            display: flex;
            gap: 0.85rem;
            flex-wrap: wrap;
            align-items: flex-start;
            min-height: 80px;
            padding: 0.75rem 0;
        }

        .item-circle {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            cursor: pointer;
            position: relative;
            transition: transform 0.12s;
            max-width: 76px;
        }
        .item-circle:hover { transform: scale(1.06); }

        .item-ring {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 3px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            color: var(--text);
            text-align: center;
            line-height: 1.15;
            padding: 4px;
            background: #2e2825;
            transition: border-color 0.15s, box-shadow 0.15s;
            word-break: break-word;
            overflow: hidden;
        }
        .item-circle:hover .item-ring {
            border-color: var(--gold);
        }

        /* Category-colored borders */
        .item-circle[data-type="potion"] .item-ring { border-color: var(--potion-color); }
        .item-circle[data-type="scroll"] .item-ring { border-color: var(--scroll-color); }
        .item-circle[data-type="gear"] .item-ring   { border-color: var(--gear-color); }
        .item-circle[data-type="weapon"] .item-ring  { border-color: var(--weapon-color); }

        .item-name {
            font-size: 0.58rem;
            color: var(--muted);
            text-align: center;
            max-width: 72px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .item-price {
            font-size: 0.55rem;
            color: var(--gold);
        }
        .item-qty {
            position: absolute;
            top: -4px;
            right: 2px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 0.55rem;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        /* Spell level badge (bottom-right of circle) */
        .spell-badge {
            position: absolute;
            bottom: 14px;
            right: 0;
            background: var(--scroll-color);
            color: #fff;
            font-size: 0.5rem;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            font-weight: bold;
        }

        .item-empty {
            color: var(--muted);
            font-style: italic;
            font-size: 0.85rem;
            padding: 0.5rem 0;
        }

        /* ── Market shelf section ── */
        .market-shelf {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.85rem 1rem;
            margin-bottom: 1.25rem;
        }

        /* ── Player row (other players for trading) ── */
        .player-row {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.85rem 1rem;
            margin-bottom: 0.75rem;
            display: flex;
            gap: 0.85rem;
            align-items: flex-start;
        }
        .player-row-portrait {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--border);
            background: #2e2825;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
        }
        .player-row-portrait img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .player-row-portrait .initials {
            font-size: 1rem;
            color: var(--muted);
            user-select: none;
        }
        .player-row-info { flex: 1; min-width: 0; }
        .player-row-header {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            margin-bottom: 0.4rem;
        }
        .player-row-name {
            font-size: 0.85rem;
            color: var(--text);
            font-weight: bold;
        }
        .player-row-gold {
            font-size: 0.75rem;
            color: var(--gold);
        }

        /* ── Action tooltip/popup ── */
        .action-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--surface);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 1.25rem 1.5rem;
            z-index: 200;
            min-width: 280px;
            max-width: 360px;
            text-align: center;
        }
        .action-popup.visible { display: block; }
        .action-popup h3 {
            color: var(--gold);
            font-size: 1rem;
            margin-bottom: 0.75rem;
        }
        .action-popup p {
            color: var(--text);
            font-size: 0.88rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }
        .action-popup .popup-btns {
            display: flex;
            gap: 0.6rem;
            justify-content: center;
        }
        .popup-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            transition: opacity 0.15s;
        }
        .popup-btn:hover { opacity: 0.85; }
        .popup-btn.cancel {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
        }
        .popup-btn.cancel:hover { border-color: var(--muted); color: var(--text); }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 190;
        }
        .overlay.visible { display: block; }

        /* ── DM controls (add item to market) ── */
        .dm-controls {
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border);
        }
        .add-item-btn {
            background: none;
            border: 1px dashed var(--border);
            color: var(--muted);
            font-family: inherit;
            font-size: 0.78rem;
            padding: 0.35rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s;
        }
        .add-item-btn:hover { color: var(--gold); border-color: var(--gold); }

        /* Add-item form */
        .add-form {
            display: none;
            margin-top: 0.5rem;
            padding: 0.75rem;
            background: #1e1b18;
            border-radius: 4px;
        }
        .add-form.visible { display: block; }
        .add-form-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.4rem;
            align-items: center;
        }
        .add-form-row label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            min-width: 50px;
        }
        .add-form-row input, .add-form-row select {
            flex: 1;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            font-family: inherit;
            font-size: 0.85rem;
            padding: 0.3rem 0.5rem;
            border-radius: 3px;
            outline: none;
        }
        .add-form-row input:focus, .add-form-row select:focus { border-color: var(--gold); }
        .add-form-row select option { background: var(--surface); }

        /* ── Save bar ── */
        .save-bar {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            font-size: 0.78rem;
            color: var(--muted);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.35rem 0.75rem;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }
        .save-bar.visible { opacity: 1; }
        .save-bar.saved { color: var(--green); }

        /* ── Toast notification ── */
        .toast {
            position: fixed;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 0.5rem 1.2rem;
            border-radius: 5px;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 300;
            pointer-events: none;
        }
        .toast.visible { opacity: 1; }
    </style>
</head>
<body>

<nav class="dd-nav">
    <a href="/DD/index.html">Sessions</a>
    <a href="/DD/npcs/">NPCs</a>
    <a href="/DD/players/players.html">Players</a>
    <a href="/DD/maps/">Maps</a>
    <a href="/DD/magic/">Magic</a>
    <a href="/DD/marketplace.html">Marketplace</a>
</nav>

<div class="sess-strip" id="sess-strip"></div>

<!-- Welcome banner -->
<div class="welcome" id="welcome">
    <h1>Welcome to the Marketplace</h1>
    <p>Pick your character below to start</p>
</div>

<!-- Player selection circles -->
<div class="player-select awaiting" id="player-select"></div>

<!-- Main marketplace area (revealed after player selection) -->
<div class="market-main" id="market-main">

    <!-- Active player bar -->
    <div class="active-bar" id="active-bar"></div>

    <!-- Market shelf: items for sale -->
    <div class="market-shelf">
        <div class="section-label">
            Market Shelf
            <button class="add-item-btn" id="add-market-btn" onclick="toggleAddForm()">+ Add Item</button>
        </div>
        <div class="item-grid" id="market-grid"></div>
        <!-- DM: add new items to market -->
        <div class="add-form" id="add-form">
            <div class="add-form-row">
                <label>Name</label>
                <input type="text" id="af-name" placeholder="Item name…">
            </div>
            <div class="add-form-row">
                <label>Type</label>
                <select id="af-type">
                    <option value="potion">Potion</option>
                    <option value="scroll">Scroll</option>
                    <option value="gear">Gear</option>
                    <option value="weapon">Weapon</option>
                </select>
            </div>
            <div class="add-form-row">
                <label>Price</label>
                <input type="number" id="af-price" placeholder="gp" min="0">
            </div>
            <div class="add-form-row">
                <label>Qty</label>
                <input type="number" id="af-qty" placeholder="1" min="1" value="1">
            </div>
            <div class="add-form-row">
                <label>Spell Lv</label>
                <input type="number" id="af-spell" placeholder="—" min="0" max="9">
            </div>
            <div class="add-form-row" style="justify-content:flex-end;margin-top:0.3rem;">
                <button class="popup-btn cancel" onclick="toggleAddForm()">Cancel</button>
                <button class="popup-btn" onclick="addMarketItem()">Add to Market</button>
            </div>
        </div>
    </div>

    <!-- Your inventory section -->
    <div class="market-shelf" id="my-inventory-section">
        <div class="section-label">Your Inventory</div>
        <div class="item-grid" id="my-inventory"></div>
    </div>

    <!-- Other players section (for trading) -->
    <div id="other-players"></div>

</div>

<!-- Action popup (buy/sell/trade confirmation) -->
<div class="overlay" id="overlay" onclick="closePopup()"></div>
<div class="action-popup" id="action-popup"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<div class="save-bar" id="save-bar">saved</div>

<script>
    /* ================================================================
       MARKETPLACE — Player-facing trading hub

       Two data sources:
       - /DD/api.php?key=marketplace → market inventory + player gold/items
       - /DD/api.php?key=players    → read-only, for player names/images/levels

       Marketplace data structure:
       {
         market: [ { id, name, type, value, qty, spellLevel } ],
         players: {
           levi:     { gold: 50, items: [ { id, name, type, value, qty, spellLevel } ] },
           jeanette: { gold: 50, items: [] },
           ...
         }
       }
       ================================================================ */

    const MARKET_API = '/DD/api.php?key=marketplace';
    const PLAYERS_API = '/DD/api.php?key=players';

    // Player display info — matches the players page
    const PLAYER_INFO = {
        levi:     { label: 'Levi',     char: 'Garrick',  initials: 'L' },
        jeanette: { label: 'Jeanette', char: 'Eleil',    initials: 'J' },
        nicole:   { label: 'Nicole',   char: 'HollyGo',  initials: 'N' },
        katie:    { label: 'Katie',    char: 'Lysandra', initials: 'K' },
        brandon:  { label: 'Brandon',  char: 'Vaoker',   initials: 'B' },
        ashton:   { label: 'Ashton',   char: 'Ash',      initials: 'A' }
    };
    const PLAYER_IDS = Object.keys(PLAYER_INFO);

    // Default starting market inventory
    const DEFAULT_MARKET = [
        { id: 'm1', name: 'Healing Potion',          type: 'potion', value: 50,  qty: 3, spellLevel: null },
        { id: 'm2', name: 'Arrow Brace',             type: 'gear',   value: 1,   qty: 2, spellLevel: null },
        { id: 'm3', name: 'Faerie Fire Scroll',      type: 'scroll', value: 25,  qty: 1, spellLevel: 1 },
        { id: 'm4', name: 'Potion of Water Breathing', type: 'potion', value: 100, qty: 1, spellLevel: null },
        { id: 'm5', name: 'Magic Missile Scroll',    type: 'scroll', value: 25,  qty: 1, spellLevel: 1 }
    ];

    let marketData = { market: [], players: {} };
    let playerSheets = {};  // from players API (read-only, for level info)
    let activePlayer = null;
    let saveTimer;

    // ── Data loading ──
    async function loadMarketData() {
        try {
            const r = await fetch(MARKET_API);
            const d = r.ok ? await r.json() : {};
            // If empty or array (API returns [] for new keys), initialize
            if (!d || Array.isArray(d) || !d.market) {
                return initializeMarketData();
            }
            return d;
        } catch { return initializeMarketData(); }
    }

    async function loadPlayerSheets() {
        try {
            const r = await fetch(PLAYERS_API);
            return r.ok ? await r.json() : {};
        } catch { return {}; }
    }

    function initializeMarketData() {
        const data = {
            market: JSON.parse(JSON.stringify(DEFAULT_MARKET)),
            players: {}
        };
        // Initialize each player with starting gold based on level
        PLAYER_IDS.forEach(id => {
            const level = parseInt(playerSheets[id]?.level) || 1;
            data.players[id] = {
                gold: 50 + 25 * (level - 1),
                items: []
            };
        });
        return data;
    }

    function saveMarketData() {
        const bar = document.getElementById('save-bar');
        bar.textContent = 'saving…';
        bar.className = 'save-bar visible';
        clearTimeout(saveTimer);
        saveTimer = setTimeout(async () => {
            await fetch(MARKET_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(marketData)
            });
            bar.textContent = 'saved';
            bar.className = 'save-bar visible saved';
            setTimeout(() => { bar.className = 'save-bar'; }, 1500);
        }, 600);
    }

    // ── Toast notifications ──
    let toastTimer;
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast visible';
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { t.className = 'toast'; }, 2000);
    }

    // ── Render player selection circles ──
    function renderPlayerSelect() {
        const wrap = document.getElementById('player-select');
        wrap.innerHTML = '';
        PLAYER_IDS.forEach(id => {
            const info = PLAYER_INFO[id];
            const div = document.createElement('div');
            div.className = 'p-circle' + (activePlayer === id ? ' active' : '');
            div.innerHTML = `
                <div class="p-circle-img">
                    <span class="p-circle-initials">${info.initials}</span>
                    <img src="/DD/players/images/${id}.png" loading="lazy" onerror="this.remove()">
                </div>
                <div class="p-circle-name">${info.char}</div>
            `;
            div.addEventListener('click', () => selectPlayer(id));
            wrap.appendChild(div);
        });
    }

    // ── Select a player ──
    function selectPlayer(id) {
        activePlayer = id;

        // Ensure this player has data
        if (!marketData.players[id]) {
            const level = parseInt(playerSheets[id]?.level) || 1;
            marketData.players[id] = { gold: 50 + 25 * (level - 1), items: [] };
        }

        // Stop glow animation, mark active
        const wrap = document.getElementById('player-select');
        wrap.classList.remove('awaiting');
        renderPlayerSelect();

        // Shrink the welcome
        const welcome = document.getElementById('welcome');
        welcome.querySelector('p').textContent = 'Tap another character to switch';

        // Show the marketplace
        document.getElementById('market-main').classList.add('visible');
        renderAll();
    }

    // ── Render everything ──
    function renderAll() {
        if (!activePlayer) return;
        renderActiveBar();
        renderMarketGrid();
        renderMyInventory();
        renderOtherPlayers();
    }

    // ── Active player bar ──
    function renderActiveBar() {
        const info = PLAYER_INFO[activePlayer];
        const pd = marketData.players[activePlayer];
        const bar = document.getElementById('active-bar');
        bar.innerHTML = `
            <div class="active-bar-img">
                <span style="font-size:0.9rem;color:var(--muted)">${info.initials}</span>
                <img src="/DD/players/images/${activePlayer}.png" loading="lazy" onerror="this.remove()">
            </div>
            <span class="active-bar-name">${info.char}</span>
            <span class="active-bar-gold"><span class="gold-icon">⬡</span> ${pd.gold} gp</span>
            <button class="change-btn" onclick="resetSelection()">Change</button>
        `;
    }

    // ── Render market grid ──
    function renderMarketGrid() {
        const grid = document.getElementById('market-grid');
        grid.innerHTML = '';
        if (marketData.market.length === 0) {
            grid.innerHTML = '<div class="item-empty">The market is empty.</div>';
            return;
        }
        marketData.market.forEach(item => {
            if (item.qty <= 0) return;
            grid.appendChild(createItemCircle(item, 'buy'));
        });
    }

    // ── Render active player's inventory ──
    function renderMyInventory() {
        const grid = document.getElementById('my-inventory');
        const pd = marketData.players[activePlayer];
        grid.innerHTML = '';
        if (!pd.items || pd.items.length === 0) {
            grid.innerHTML = '<div class="item-empty">No items yet. Buy something from the market!</div>';
            return;
        }
        pd.items.forEach(item => {
            grid.appendChild(createItemCircle(item, 'sell'));
        });
    }

    // ── Render other players (for trading) ──
    function renderOtherPlayers() {
        const wrap = document.getElementById('other-players');
        wrap.innerHTML = '';
        const label = document.createElement('div');
        label.className = 'section-label';
        label.style.marginBottom = '0.6rem';
        label.textContent = 'Other Adventurers';
        wrap.appendChild(label);

        PLAYER_IDS.forEach(id => {
            if (id === activePlayer) return;
            const info = PLAYER_INFO[id];
            const pd = marketData.players[id] || { gold: 0, items: [] };

            const row = document.createElement('div');
            row.className = 'player-row';
            row.innerHTML = `
                <div class="player-row-portrait">
                    <span class="initials">${info.initials}</span>
                    <img src="/DD/players/images/${id}.png" loading="lazy" onerror="this.remove()">
                </div>
                <div class="player-row-info">
                    <div class="player-row-header">
                        <span class="player-row-name">${info.char}</span>
                        <span class="player-row-gold">⬡ ${pd.gold} gp</span>
                    </div>
                    <div class="item-grid" style="min-height:50px;padding:0.4rem 0;"></div>
                </div>
            `;

            const itemGrid = row.querySelector('.item-grid');
            if (!pd.items || pd.items.length === 0) {
                itemGrid.innerHTML = '<div class="item-empty" style="font-size:0.75rem">No items</div>';
            } else {
                pd.items.forEach(item => {
                    itemGrid.appendChild(createItemCircle(item, 'trade', id));
                });
            }
            wrap.appendChild(row);
        });
    }

    // ── Create a single item circle element ──
    function createItemCircle(item, action, ownerId) {
        const div = document.createElement('div');
        div.className = 'item-circle';
        div.dataset.type = item.type || 'gear';

        // Short display name for inside the circle
        const shortName = item.name.length > 10
            ? item.name.split(' ').map(w => w[0]).join('').toUpperCase()
            : item.name;

        let qtyBadge = '';
        if (item.qty > 1) {
            qtyBadge = `<span class="item-qty">×${item.qty}</span>`;
        }

        let spellBadge = '';
        if (item.spellLevel) {
            spellBadge = `<span class="spell-badge">${item.spellLevel}</span>`;
        }

        div.innerHTML = `
            <div class="item-ring">${shortName}</div>
            <div class="item-name">${item.name}</div>
            <div class="item-price">${item.value} gp</div>
            ${qtyBadge}
            ${spellBadge}
        `;

        // Click handler based on action type
        div.addEventListener('click', () => {
            if (action === 'buy') showBuyPopup(item);
            else if (action === 'sell') showSellPopup(item);
            else if (action === 'trade') showTradePopup(item, ownerId);
        });

        return div;
    }

    // ── Buy popup ──
    function showBuyPopup(item) {
        const pd = marketData.players[activePlayer];
        const info = PLAYER_INFO[activePlayer];
        const canAfford = pd.gold >= item.value;

        const popup = document.getElementById('action-popup');
        popup.innerHTML = `
            <h3>Buy ${item.name}?</h3>
            <p>Cost: ${item.value} gp<br>
            Your gold: ${pd.gold} gp${!canAfford ? '<br><span style="color:var(--accent)">Not enough gold!</span>' : ''}</p>
            <div class="popup-btns">
                <button class="popup-btn cancel" onclick="closePopup()">Cancel</button>
                ${canAfford ? `<button class="popup-btn" onclick="doBuy('${item.id}')">Buy</button>` : ''}
            </div>
        `;
        openPopup();
    }

    function doBuy(itemId) {
        const market = marketData.market;
        const mi = market.find(m => m.id === itemId);
        if (!mi || mi.qty <= 0) return closePopup();

        const pd = marketData.players[activePlayer];
        if (pd.gold < mi.value) return closePopup();

        // Deduct gold
        pd.gold -= mi.value;
        // Decrease market qty
        mi.qty -= 1;

        // Add to player inventory (stack if same name+type)
        const existing = pd.items.find(i => i.name === mi.name && i.type === mi.type);
        if (existing) {
            existing.qty = (existing.qty || 1) + 1;
        } else {
            pd.items.push({
                id: Date.now().toString(36),
                name: mi.name,
                type: mi.type,
                value: mi.value,
                qty: 1,
                spellLevel: mi.spellLevel
            });
        }

        // Remove zero-qty market items
        marketData.market = market.filter(m => m.qty > 0);

        saveMarketData();
        closePopup();
        renderAll();
        showToast(`Bought ${mi.name} for ${mi.value} gp`);
    }

    // ── Sell popup ──
    function showSellPopup(item) {
        const sellPrice = Math.floor(item.value / 2);
        const popup = document.getElementById('action-popup');
        popup.innerHTML = `
            <h3>Sell ${item.name}?</h3>
            <p>Sell price: ${sellPrice} gp (half value)<br>
            ${item.qty > 1 ? `You have ${item.qty}. Sell one?` : 'Sell this item?'}</p>
            <div class="popup-btns">
                <button class="popup-btn cancel" onclick="closePopup()">Cancel</button>
                <button class="popup-btn" onclick="doSell('${item.id}')">Sell</button>
            </div>
        `;
        openPopup();
    }

    function doSell(itemId) {
        const pd = marketData.players[activePlayer];
        const item = pd.items.find(i => i.id === itemId);
        if (!item) return closePopup();

        const sellPrice = Math.floor(item.value / 2);
        pd.gold += sellPrice;

        // Decrease qty or remove
        item.qty = (item.qty || 1) - 1;
        if (item.qty <= 0) {
            pd.items = pd.items.filter(i => i.id !== itemId);
        }

        // Add back to market (stack if same name exists)
        const marketItem = marketData.market.find(m => m.name === item.name && m.type === item.type);
        if (marketItem) {
            marketItem.qty += 1;
        } else {
            marketData.market.push({
                id: Date.now().toString(36),
                name: item.name,
                type: item.type,
                value: item.value,
                qty: 1,
                spellLevel: item.spellLevel
            });
        }

        saveMarketData();
        closePopup();
        renderAll();
        showToast(`Sold ${item.name} for ${sellPrice} gp`);
    }

    // ── Trade popup (buy from another player) ──
    function showTradePopup(item, ownerId) {
        const ownerInfo = PLAYER_INFO[ownerId];
        const pd = marketData.players[activePlayer];
        const canAfford = pd.gold >= item.value;

        const popup = document.getElementById('action-popup');
        popup.innerHTML = `
            <h3>Buy from ${ownerInfo.char}?</h3>
            <p>${item.name} — ${item.value} gp<br>
            Your gold: ${pd.gold} gp
            ${!canAfford ? '<br><span style="color:var(--accent)">Not enough gold!</span>' : ''}</p>
            <div class="popup-btns">
                <button class="popup-btn cancel" onclick="closePopup()">Cancel</button>
                ${canAfford ? `<button class="popup-btn" onclick="doTrade('${item.id}','${ownerId}')">Buy</button>` : ''}
            </div>
        `;
        openPopup();
    }

    function doTrade(itemId, ownerId) {
        const seller = marketData.players[ownerId];
        const buyer = marketData.players[activePlayer];
        const item = seller.items.find(i => i.id === itemId);
        if (!item || buyer.gold < item.value) return closePopup();

        // Transfer gold
        buyer.gold -= item.value;
        seller.gold += item.value;

        // Transfer item
        const qtyToMove = 1;
        item.qty = (item.qty || 1) - 1;
        if (item.qty <= 0) {
            seller.items = seller.items.filter(i => i.id !== itemId);
        }

        // Add to buyer
        const existing = buyer.items.find(i => i.name === item.name && i.type === item.type);
        if (existing) {
            existing.qty = (existing.qty || 1) + 1;
        } else {
            buyer.items.push({
                id: Date.now().toString(36),
                name: item.name,
                type: item.type,
                value: item.value,
                qty: 1,
                spellLevel: item.spellLevel
            });
        }

        saveMarketData();
        closePopup();
        renderAll();
        showToast(`Bought ${item.name} from ${PLAYER_INFO[ownerId].char}`);
    }

    // ── Popup helpers ──
    function openPopup() {
        document.getElementById('overlay').classList.add('visible');
        document.getElementById('action-popup').classList.add('visible');
    }
    function closePopup() {
        document.getElementById('overlay').classList.remove('visible');
        document.getElementById('action-popup').classList.remove('visible');
    }

    // ── Reset to player selection ──
    function resetSelection() {
        activePlayer = null;
        document.getElementById('market-main').classList.remove('visible');
        document.getElementById('welcome').querySelector('p').textContent = 'Pick your character below to start';
        const wrap = document.getElementById('player-select');
        wrap.classList.add('awaiting');
        renderPlayerSelect();
    }

    // ── DM: Add item to market ──
    function toggleAddForm() {
        document.getElementById('add-form').classList.toggle('visible');
    }

    function addMarketItem() {
        const name = document.getElementById('af-name').value.trim();
        const type = document.getElementById('af-type').value;
        const price = parseInt(document.getElementById('af-price').value) || 0;
        const qty = parseInt(document.getElementById('af-qty').value) || 1;
        const spellLv = parseInt(document.getElementById('af-spell').value) || null;

        if (!name) return;

        marketData.market.push({
            id: Date.now().toString(36),
            name, type, value: price, qty, spellLevel: spellLv
        });

        // Clear form
        document.getElementById('af-name').value = '';
        document.getElementById('af-price').value = '';
        document.getElementById('af-qty').value = '1';
        document.getElementById('af-spell').value = '';
        toggleAddForm();

        saveMarketData();
        renderAll();
        showToast(`Added ${name} to the market`);
    }

    // ── Init ──
    (async () => {
        // Load player sheet data first (for levels → starting gold)
        playerSheets = await loadPlayerSheets();
        marketData = await loadMarketData();

        // Ensure all players exist in marketplace data
        PLAYER_IDS.forEach(id => {
            if (!marketData.players[id]) {
                const level = parseInt(playerSheets[id]?.level) || 1;
                marketData.players[id] = { gold: 50 + 25 * (level - 1), items: [] };
            }
        });

        renderPlayerSelect();
    })();
</script>
<script src="/DD/strip.js"></script>

</body>
