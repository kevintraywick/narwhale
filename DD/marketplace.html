<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace</title>
    <link rel="stylesheet" href="/DD/strip.css" />
    <style>
        :root {
            --bg: #1a1614;
            --surface: #231f1c;
            --border: #3d3530;
            --gold: #c9a84c;
            --accent: #8b1a1a;
            --text: #e8ddd0;
            --muted: #8a7d6e;
            --green: #5a8a5a;
            --potion-color: #6a8a4a;
            --scroll-color: #4a7a9a;
            --gear-color: #9a7a3a;
            --weapon-color: #8a3a3a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            font-family: 'Georgia', serif;
            min-height: 100vh;
            color: var(--text);
        }

        /* ── Nav ── */
        .dd-nav {
            display: flex;
            gap: 0.75rem;
            padding: 0.75rem 1.25rem;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }
        .dd-nav a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0.3rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            transition: color 0.15s, border-color 0.15s;
        }
        .dd-nav a:hover { color: var(--gold); border-color: var(--gold); }

        /* ── Welcome banner ── */
        .welcome {
            text-align: center;
            padding: 1.5rem 1rem 0.5rem;
        }
        .welcome h1 {
            font-size: 1.4rem;
            color: var(--gold);
            letter-spacing: 0.06em;
            margin-bottom: 0.4rem;
        }
        .welcome p {
            color: var(--muted);
            font-size: 0.88rem;
        }

        /* ── Market shelf (top area, replaces old player circles) ── */
        .market-shelf {
            display: flex;
            justify-content: center;
            gap: 1.25rem;
            padding: 1.25rem 1rem 1.5rem;
            flex-wrap: wrap;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }
        .shelf-label {
            width: 100%;
            text-align: center;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--muted);
            margin-bottom: 0.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }
        .shelf-label button {
            background: none;
            border: 1px dashed var(--border);
            color: var(--muted);
            font-family: inherit;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 0.2rem 0.5rem;
            border-radius: 3px;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s;
        }
        .shelf-label button:hover { color: var(--gold); border-color: var(--gold); }

        /* ── Item circles (shared for market + player inventories) ── */
        .item-circle {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            cursor: pointer;
            position: relative;
            transition: transform 0.12s;
            max-width: 76px;
        }
        .item-circle:hover { transform: scale(1.06); }

        .item-ring {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 3px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            color: var(--text);
            text-align: center;
            line-height: 1.15;
            padding: 4px;
            background: #2e2825;
            transition: border-color 0.15s, box-shadow 0.15s;
            word-break: break-word;
            overflow: hidden;
        }
        .item-circle:hover .item-ring { border-color: var(--gold); }

        /* Category-colored borders */
        .item-circle[data-type="potion"] .item-ring { border-color: var(--potion-color); }
        .item-circle[data-type="scroll"] .item-ring { border-color: var(--scroll-color); }
        .item-circle[data-type="gear"] .item-ring   { border-color: var(--gear-color); }
        .item-circle[data-type="weapon"] .item-ring  { border-color: var(--weapon-color); }

        .item-name {
            font-size: 0.58rem;
            color: var(--muted);
            text-align: center;
            max-width: 72px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .item-price {
            font-size: 0.55rem;
            color: var(--gold);
        }
        .item-qty {
            position: absolute;
            top: -4px;
            right: 2px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 0.55rem;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        /* Spell level badge */
        .spell-badge {
            position: absolute;
            bottom: 14px;
            right: 0;
            background: var(--scroll-color);
            color: #fff;
            font-size: 0.5rem;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            font-weight: bold;
        }

        .item-empty {
            color: var(--muted);
            font-style: italic;
            font-size: 0.78rem;
            padding: 0.3rem 0;
        }

        /* ── Player table (3-column layout) ── */
        .player-table {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 0.5rem 4rem;
        }

        .player-row {
            display: grid;
            grid-template-columns: 90px 1fr 80px;
            min-height: 90px;
            border-bottom: 1px solid var(--border);
        }
        .player-row:last-child { border-bottom: none; }

        /* Column dividers via border-right */
        .pr-portrait {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            padding: 0.75rem 0.4rem;
            border-right: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
        }
        .pr-portrait:hover { background: rgba(201,168,76,0.06); }

        .pr-portrait-img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--border);
            background: #2e2825;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .pr-portrait-img img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .pr-portrait-initials {
            font-size: 1.1rem;
            color: var(--muted);
            user-select: none;
        }
        .pr-portrait-name {
            font-size: 0.6rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            transition: color 0.2s;
        }

        /* Pulsing glow on portraits before anyone is selected */
        .awaiting .pr-portrait-img {
            animation: pulse-glow 2s ease-in-out infinite;
        }
        .player-row:nth-child(2) .pr-portrait-img { animation-delay: 0.33s; }
        .player-row:nth-child(3) .pr-portrait-img { animation-delay: 0.66s; }
        .player-row:nth-child(4) .pr-portrait-img { animation-delay: 1s; }
        .player-row:nth-child(5) .pr-portrait-img { animation-delay: 1.33s; }
        .player-row:nth-child(6) .pr-portrait-img { animation-delay: 1.66s; }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 6px rgba(201,168,76,0.15); border-color: var(--border); }
            50% { box-shadow: 0 0 16px rgba(201,168,76,0.5); border-color: var(--gold); }
        }

        /* Active player highlight */
        .player-row.active .pr-portrait-img {
            border-color: var(--gold);
            box-shadow: 0 0 0 2px var(--gold);
            animation: none;
        }
        .player-row.active .pr-portrait-name { color: var(--gold); }
        .player-row.active { background: rgba(201,168,76,0.04); }

        /* Inventory column */
        .pr-items {
            display: flex;
            gap: 0.65rem;
            flex-wrap: wrap;
            align-items: center;
            padding: 0.65rem 0.85rem;
            border-right: 1px solid var(--border);
            min-height: 80px;
        }

        /* Smaller circles inside player rows */
        .pr-items .item-circle { max-width: 64px; }
        .pr-items .item-ring {
            width: 46px;
            height: 46px;
            font-size: 0.58rem;
        }
        .pr-items .item-name { font-size: 0.52rem; max-width: 60px; }
        .pr-items .item-price { font-size: 0.48rem; }
        .pr-items .item-qty { width: 16px; height: 16px; font-size: 0.5rem; top: -3px; right: 0; }
        .pr-items .spell-badge { width: 14px; height: 14px; font-size: 0.45rem; bottom: 11px; }

        /* Gold column */
        .pr-gold {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            gap: 0.2rem;
        }
        .pr-gold-icon {
            font-size: 1.3rem;
            color: var(--gold);
        }
        .pr-gold-amount {
            font-size: 0.95rem;
            color: var(--gold);
            font-weight: bold;
        }
        .pr-gold-label {
            font-size: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
        }

        /* Column headers */
        .col-headers {
            display: grid;
            grid-template-columns: 90px 1fr 80px;
            max-width: 900px;
            margin: 0 auto;
            padding: 0.5rem 0.5rem 0;
        }
        .col-header {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.13em;
            color: var(--muted);
            padding: 0.3rem 0.5rem;
            border-bottom: 1px solid var(--border);
        }
        .col-header:nth-child(2) { padding-left: 0.85rem; }
        .col-header:last-child { text-align: center; }

        /* ── Action popup ── */
        .action-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--surface);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 1.25rem 1.5rem;
            z-index: 200;
            min-width: 280px;
            max-width: 360px;
            text-align: center;
        }
        .action-popup.visible { display: block; }
        .action-popup h3 {
            color: var(--gold);
            font-size: 1rem;
            margin-bottom: 0.75rem;
        }
        .action-popup p {
            color: var(--text);
            font-size: 0.88rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }
        .action-popup .popup-btns {
            display: flex;
            gap: 0.6rem;
            justify-content: center;
        }
        .popup-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            transition: opacity 0.15s;
        }
        .popup-btn:hover { opacity: 0.85; }
        .popup-btn.cancel {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
        }
        .popup-btn.cancel:hover { border-color: var(--muted); color: var(--text); }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 190;
        }
        .overlay.visible { display: block; }

        /* ── Add-item form (inside market shelf) ── */
        .add-form {
            display: none;
            width: 100%;
            padding: 0.75rem;
            background: #1e1b18;
            border-radius: 4px;
            margin-top: 0.25rem;
        }
        .add-form.visible { display: block; }
        .add-form-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.4rem;
            align-items: center;
        }
        .add-form-row label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            min-width: 50px;
        }
        .add-form-row input, .add-form-row select {
            flex: 1;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            font-family: inherit;
            font-size: 0.85rem;
            padding: 0.3rem 0.5rem;
            border-radius: 3px;
            outline: none;
        }
        .add-form-row input:focus, .add-form-row select:focus { border-color: var(--gold); }
        .add-form-row select option { background: var(--surface); }

        /* ── Save bar ── */
        .save-bar {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            font-size: 0.78rem;
            color: var(--muted);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.35rem 0.75rem;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }
        .save-bar.visible { opacity: 1; }
        .save-bar.saved { color: var(--green); }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 0.5rem 1.2rem;
            border-radius: 5px;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 300;
            pointer-events: none;
        }
        .toast.visible { opacity: 1; }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .player-row { grid-template-columns: 70px 1fr 60px; }
            .col-headers { grid-template-columns: 70px 1fr 60px; }
            .pr-portrait-img { width: 40px; height: 40px; }
            .pr-items .item-ring { width: 38px; height: 38px; font-size: 0.5rem; }
        }
    </style>
</head>
<body>

<nav class="dd-nav">
    <a href="/DD/index.html">Sessions</a>
    <a href="/DD/npcs/">NPCs</a>
    <a href="/DD/players/players.html">Players</a>
    <a href="/DD/maps/">Maps</a>
    <a href="/DD/magic/">Magic</a>
    <a href="/DD/marketplace.html">Marketplace</a>
</nav>

<div class="sess-strip" id="sess-strip"></div>

<!-- Welcome banner -->
<div class="welcome" id="welcome">
    <h1>Welcome to the Marketplace</h1>
    <p>Pick your character below to start</p>
</div>

<!-- Market shelf at top (same position/size as old player circles) -->
<div class="market-shelf" id="market-shelf">
    <div class="shelf-label">
        Market Shelf
        <button id="add-market-btn" onclick="toggleAddForm()">+ Add Item</button>
    </div>
    <div id="market-grid" style="display:contents;"></div>
    <div class="add-form" id="add-form">
        <div class="add-form-row">
            <label>Name</label>
            <input type="text" id="af-name" placeholder="Item name…">
        </div>
        <div class="add-form-row">
            <label>Type</label>
            <select id="af-type">
                <option value="potion">Potion</option>
                <option value="scroll">Scroll</option>
                <option value="gear">Gear</option>
                <option value="weapon">Weapon</option>
            </select>
        </div>
        <div class="add-form-row">
            <label>Price</label>
            <input type="number" id="af-price" placeholder="gp" min="0">
        </div>
        <div class="add-form-row">
            <label>Qty</label>
            <input type="number" id="af-qty" placeholder="1" min="1" value="1">
        </div>
        <div class="add-form-row">
            <label>Spell Lv</label>
            <input type="number" id="af-spell" placeholder="—" min="0" max="9">
        </div>
        <div class="add-form-row" style="justify-content:flex-end;margin-top:0.3rem;">
            <button class="popup-btn cancel" onclick="toggleAddForm()">Cancel</button>
            <button class="popup-btn" onclick="addMarketItem()">Add to Market</button>
        </div>
    </div>
</div>

<!-- Column headers -->
<div class="col-headers">
    <div class="col-header">Character</div>
    <div class="col-header">Inventory</div>
    <div class="col-header">Gold</div>
</div>

<!-- Player rows (3-column table) -->
<div class="player-table awaiting" id="player-table"></div>

<!-- Popups -->
<div class="overlay" id="overlay" onclick="closePopup()"></div>
<div class="action-popup" id="action-popup"></div>

<div class="toast" id="toast"></div>
<div class="save-bar" id="save-bar">saved</div>

<script>
    /* ================================================================
       MARKETPLACE — Redesigned layout

       Top:    Market shelf with buyable item circles
       Below:  Player rows in a 3-column grid:
               [Portrait] | [Inventory items] | [Gold]
       Selection: click a portrait in column 1 to become active player.
       Buy:    click a market item → popup → deduct gold, add to inventory
       Sell:   click your own item → popup → gain gold, return to market
       Trade:  click another player's item → popup → transfer gold + item
       ================================================================ */

    const MARKET_API = '/DD/api.php?key=marketplace';
    const PLAYERS_API = '/DD/api.php?key=players';

    const PLAYER_INFO = {
        levi:     { label: 'Levi',     char: 'Garrick',  initials: 'L' },
        jeanette: { label: 'Jeanette', char: 'Eleil',    initials: 'J' },
        nicole:   { label: 'Nicole',   char: 'HollyGo',  initials: 'N' },
        katie:    { label: 'Katie',    char: 'Lysandra', initials: 'K' },
        brandon:  { label: 'Brandon',  char: 'Vaoker',   initials: 'B' },
        ashton:   { label: 'Ashton',   char: 'Ash',      initials: 'A' }
    };
    const PLAYER_IDS = Object.keys(PLAYER_INFO);

    // Default market inventory
    const DEFAULT_MARKET = [
        { id: 'm1', name: 'Healing Potion',            type: 'potion', value: 50,  qty: 3, spellLevel: null },
        { id: 'm2', name: 'Arrow Brace',               type: 'gear',   value: 1,   qty: 2, spellLevel: null },
        { id: 'm3', name: 'Faerie Fire Scroll',        type: 'scroll', value: 25,  qty: 1, spellLevel: 1 },
        { id: 'm4', name: 'Potion of Water Breathing', type: 'potion', value: 100, qty: 1, spellLevel: null },
        { id: 'm5', name: 'Magic Missile Scroll',      type: 'scroll', value: 25,  qty: 1, spellLevel: 1 }
    ];

    /* Starting scroll for each player — one random-ish spell scroll
       per character, thematically matched to their class */
    const STARTING_SCROLLS = {
        levi:     { name: 'Cure Wounds Scroll',     spellLevel: 1 },
        jeanette: { name: 'Entangle Scroll',        spellLevel: 1 },
        nicole:   { name: 'Shield of Faith Scroll', spellLevel: 1 },
        katie:    { name: 'Charm Person Scroll',    spellLevel: 1 },
        brandon:  { name: 'Heroism Scroll',         spellLevel: 1 },
        ashton:   { name: 'Protection from Evil Scroll', spellLevel: 1 }
    };

    let marketData = { market: [], players: {} };
    let playerSheets = {};
    let activePlayer = null;
    let saveTimer;

    // ── Data loading ──
    async function loadMarketData() {
        try {
            const r = await fetch(MARKET_API);
            const d = r.ok ? await r.json() : {};
            if (!d || Array.isArray(d) || !d.market) {
                return initializeMarketData();
            }
            return d;
        } catch { return initializeMarketData(); }
    }

    async function loadPlayerSheets() {
        try {
            const r = await fetch(PLAYERS_API);
            return r.ok ? await r.json() : {};
        } catch { return {}; }
    }

    function initializeMarketData() {
        const data = {
            market: JSON.parse(JSON.stringify(DEFAULT_MARKET)),
            players: {}
        };
        PLAYER_IDS.forEach(id => {
            const level = parseInt(playerSheets[id]?.level) || 1;
            const scroll = STARTING_SCROLLS[id];
            data.players[id] = {
                gold: 50 + 25 * (level - 1),
                items: [
                    { id: Date.now().toString(36) + id + 'hp', name: 'Healing Potion', type: 'potion', value: 50, qty: 2, spellLevel: null },
                    { id: Date.now().toString(36) + id + 'sc', name: scroll.name, type: 'scroll', value: 25, qty: 1, spellLevel: scroll.spellLevel }
                ]
            };
        });
        return data;
    }

    function saveMarketData() {
        const bar = document.getElementById('save-bar');
        bar.textContent = 'saving…';
        bar.className = 'save-bar visible';
        clearTimeout(saveTimer);
        saveTimer = setTimeout(async () => {
            await fetch(MARKET_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(marketData)
            });
            bar.textContent = 'saved';
            bar.className = 'save-bar visible saved';
            setTimeout(() => { bar.className = 'save-bar'; }, 1500);
        }, 600);
    }

    // ── Toast ──
    let toastTimer;
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast visible';
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { t.className = 'toast'; }, 2000);
    }

    // ── Select a player by clicking their portrait ──
    function selectPlayer(id) {
        activePlayer = id;
        if (!marketData.players[id]) {
            const level = parseInt(playerSheets[id]?.level) || 1;
            const scroll = STARTING_SCROLLS[id];
            marketData.players[id] = {
                gold: 50 + 25 * (level - 1),
                items: [
                    { id: Date.now().toString(36) + id + 'hp', name: 'Healing Potion', type: 'potion', value: 50, qty: 2, spellLevel: null },
                    { id: Date.now().toString(36) + id + 'sc', name: scroll.name, type: 'scroll', value: 25, qty: 1, spellLevel: scroll.spellLevel }
                ]
            };
        }
        // Stop pulse animation
        document.getElementById('player-table').classList.remove('awaiting');
        document.getElementById('welcome').querySelector('p').textContent =
            PLAYER_INFO[id].char + ' is shopping. Tap another portrait to switch.';
        renderAll();
    }

    // ── Render everything ──
    function renderAll() {
        renderMarketShelf();
        renderPlayerTable();
    }

    // ── Render market shelf circles ──
    function renderMarketShelf() {
        const grid = document.getElementById('market-grid');
        // Remove old circles (keep add-form and shelf-label)
        grid.innerHTML = '';
        const visibleItems = marketData.market.filter(m => m.qty > 0);
        if (visibleItems.length === 0) {
            const empty = document.createElement('div');
            empty.className = 'item-empty';
            empty.textContent = 'The market is empty.';
            grid.appendChild(empty);
        } else {
            visibleItems.forEach(item => {
                grid.appendChild(createItemCircle(item, 'buy'));
            });
        }
    }

    // ── Render the player table rows ──
    function renderPlayerTable() {
        const table = document.getElementById('player-table');
        table.innerHTML = '';

        PLAYER_IDS.forEach(id => {
            const info = PLAYER_INFO[id];
            const pd = marketData.players[id] || { gold: 0, items: [] };
            const isActive = activePlayer === id;

            const row = document.createElement('div');
            row.className = 'player-row' + (isActive ? ' active' : '');

            // Column 1: Portrait (clickable to select)
            const portrait = document.createElement('div');
            portrait.className = 'pr-portrait';
            portrait.innerHTML = `
                <div class="pr-portrait-img">
                    <span class="pr-portrait-initials">${info.initials}</span>
                    <img src="/DD/players/images/${id}.png" loading="lazy" onerror="this.remove()">
                </div>
                <div class="pr-portrait-name">${info.char}</div>
            `;
            portrait.addEventListener('click', () => selectPlayer(id));

            // Column 2: Inventory items
            const items = document.createElement('div');
            items.className = 'pr-items';
            if (!pd.items || pd.items.length === 0) {
                items.innerHTML = '<div class="item-empty">No items</div>';
            } else {
                pd.items.forEach(item => {
                    // Determine action: sell if active player's row, trade if another player's row
                    const action = isActive ? 'sell' : (activePlayer ? 'trade' : null);
                    const circle = createItemCircle(item, action, id);
                    if (!activePlayer) circle.style.cursor = 'default';
                    items.appendChild(circle);
                });
            }

            // Column 3: Gold
            const gold = document.createElement('div');
            gold.className = 'pr-gold';
            gold.innerHTML = `
                <span class="pr-gold-icon">⬡</span>
                <span class="pr-gold-amount">${pd.gold}</span>
                <span class="pr-gold-label">gp</span>
            `;

            row.appendChild(portrait);
            row.appendChild(items);
            row.appendChild(gold);
            table.appendChild(row);
        });
    }

    // ── Create a single item circle ──
    function createItemCircle(item, action, ownerId) {
        const div = document.createElement('div');
        div.className = 'item-circle';
        div.dataset.type = item.type || 'gear';

        const shortName = item.name.length > 10
            ? item.name.split(' ').map(w => w[0]).join('').toUpperCase()
            : item.name;

        let qtyBadge = item.qty > 1
            ? `<span class="item-qty">×${item.qty}</span>` : '';
        let spellBadge = item.spellLevel
            ? `<span class="spell-badge">${item.spellLevel}</span>` : '';

        div.innerHTML = `
            <div class="item-ring">${shortName}</div>
            <div class="item-name">${item.name}</div>
            <div class="item-price">${item.value} gp</div>
            ${qtyBadge}
            ${spellBadge}
        `;

        if (action && activePlayer) {
            div.addEventListener('click', () => {
                if (action === 'buy') showBuyPopup(item);
                else if (action === 'sell') showSellPopup(item);
                else if (action === 'trade') showTradePopup(item, ownerId);
            });
        }

        return div;
    }

    // ── Buy popup ──
    function showBuyPopup(item) {
        if (!activePlayer) return;
        const pd = marketData.players[activePlayer];
        const canAfford = pd.gold >= item.value;
        const popup = document.getElementById('action-popup');
        popup.innerHTML = `
            <h3>Buy ${item.name}?</h3>
            <p>Cost: ${item.value} gp<br>
            Your gold: ${pd.gold} gp${!canAfford ? '<br><span style="color:var(--accent)">Not enough gold!</span>' : ''}</p>
            <div class="popup-btns">
                <button class="popup-btn cancel" onclick="closePopup()">Cancel</button>
                ${canAfford ? `<button class="popup-btn" onclick="doBuy('${item.id}')">Buy</button>` : ''}
            </div>
        `;
        openPopup();
    }

    function doBuy(itemId) {
        const mi = marketData.market.find(m => m.id === itemId);
        if (!mi || mi.qty <= 0) return closePopup();
        const pd = marketData.players[activePlayer];
        if (pd.gold < mi.value) return closePopup();

        pd.gold -= mi.value;
        mi.qty -= 1;

        const existing = pd.items.find(i => i.name === mi.name && i.type === mi.type);
        if (existing) {
            existing.qty = (existing.qty || 1) + 1;
        } else {
            pd.items.push({
                id: Date.now().toString(36),
                name: mi.name, type: mi.type, value: mi.value,
                qty: 1, spellLevel: mi.spellLevel
            });
        }
        marketData.market = marketData.market.filter(m => m.qty > 0);

        saveMarketData();
        closePopup();
        renderAll();
        showToast(`Bought ${mi.name} for ${mi.value} gp`);
    }

    // ── Sell popup ──
    function showSellPopup(item) {
        if (!activePlayer) return;
        const sellPrice = Math.floor(item.value / 2);
        const popup = document.getElementById('action-popup');
        popup.innerHTML = `
            <h3>Sell ${item.name}?</h3>
            <p>Sell price: ${sellPrice} gp (half value)<br>
            ${item.qty > 1 ? `You have ${item.qty}. Sell one?` : 'Sell this item?'}</p>
            <div class="popup-btns">
                <button class="popup-btn cancel" onclick="closePopup()">Cancel</button>
                <button class="popup-btn" onclick="doSell('${item.id}')">Sell</button>
            </div>
        `;
        openPopup();
    }

    function doSell(itemId) {
        const pd = marketData.players[activePlayer];
        const item = pd.items.find(i => i.id === itemId);
        if (!item) return closePopup();

        const sellPrice = Math.floor(item.value / 2);
        pd.gold += sellPrice;
        item.qty = (item.qty || 1) - 1;
        if (item.qty <= 0) pd.items = pd.items.filter(i => i.id !== itemId);

        const marketItem = marketData.market.find(m => m.name === item.name && m.type === item.type);
        if (marketItem) { marketItem.qty += 1; }
        else {
            marketData.market.push({
                id: Date.now().toString(36),
                name: item.name, type: item.type, value: item.value,
                qty: 1, spellLevel: item.spellLevel
            });
        }

        saveMarketData();
        closePopup();
        renderAll();
        showToast(`Sold ${item.name} for ${sellPrice} gp`);
    }

    // ── Trade popup ──
    function showTradePopup(item, ownerId) {
        if (!activePlayer) return;
        const ownerInfo = PLAYER_INFO[ownerId];
        const pd = marketData.players[activePlayer];
        const canAfford = pd.gold >= item.value;
        const popup = document.getElementById('action-popup');
        popup.innerHTML = `
            <h3>Buy from ${ownerInfo.char}?</h3>
            <p>${item.name} — ${item.value} gp<br>
            Your gold: ${pd.gold} gp
            ${!canAfford ? '<br><span style="color:var(--accent)">Not enough gold!</span>' : ''}</p>
            <div class="popup-btns">
                <button class="popup-btn cancel" onclick="closePopup()">Cancel</button>
                ${canAfford ? `<button class="popup-btn" onclick="doTrade('${item.id}','${ownerId}')">Buy</button>` : ''}
            </div>
        `;
        openPopup();
    }

    function doTrade(itemId, ownerId) {
        const seller = marketData.players[ownerId];
        const buyer = marketData.players[activePlayer];
        const item = seller.items.find(i => i.id === itemId);
        if (!item || buyer.gold < item.value) return closePopup();

        buyer.gold -= item.value;
        seller.gold += item.value;

        item.qty = (item.qty || 1) - 1;
        if (item.qty <= 0) seller.items = seller.items.filter(i => i.id !== itemId);

        const existing = buyer.items.find(i => i.name === item.name && i.type === item.type);
        if (existing) { existing.qty = (existing.qty || 1) + 1; }
        else {
            buyer.items.push({
                id: Date.now().toString(36),
                name: item.name, type: item.type, value: item.value,
                qty: 1, spellLevel: item.spellLevel
            });
        }

        saveMarketData();
        closePopup();
        renderAll();
        showToast(`Bought ${item.name} from ${PLAYER_INFO[ownerId].char}`);
    }

    // ── Popup helpers ──
    function openPopup() {
        document.getElementById('overlay').classList.add('visible');
        document.getElementById('action-popup').classList.add('visible');
    }
    function closePopup() {
        document.getElementById('overlay').classList.remove('visible');
        document.getElementById('action-popup').classList.remove('visible');
    }

    // ── DM: Add item to market ──
    function toggleAddForm() {
        document.getElementById('add-form').classList.toggle('visible');
    }

    function addMarketItem() {
        const name = document.getElementById('af-name').value.trim();
        const type = document.getElementById('af-type').value;
        const price = parseInt(document.getElementById('af-price').value) || 0;
        const qty = parseInt(document.getElementById('af-qty').value) || 1;
        const spellLv = parseInt(document.getElementById('af-spell').value) || null;
        if (!name) return;

        marketData.market.push({
            id: Date.now().toString(36),
            name, type, value: price, qty, spellLevel: spellLv
        });

        document.getElementById('af-name').value = '';
        document.getElementById('af-price').value = '';
        document.getElementById('af-qty').value = '1';
        document.getElementById('af-spell').value = '';
        toggleAddForm();

        saveMarketData();
        renderAll();
        showToast(`Added ${name} to the market`);
    }

    // ── Init ──
    (async () => {
        playerSheets = await loadPlayerSheets();
        marketData = await loadMarketData();

        // Ensure all players have marketplace data
        PLAYER_IDS.forEach(id => {
            if (!marketData.players[id]) {
                const level = parseInt(playerSheets[id]?.level) || 1;
                const scroll = STARTING_SCROLLS[id];
                marketData.players[id] = {
                    gold: 50 + 25 * (level - 1),
                    items: [
                        { id: Date.now().toString(36) + id + 'hp', name: 'Healing Potion', type: 'potion', value: 50, qty: 2, spellLevel: null },
                        { id: Date.now().toString(36) + id + 'sc', name: scroll.name, type: 'scroll', value: 25, qty: 1, spellLevel: scroll.spellLevel }
                    ]
                };
            }
        });

        renderAll();
    })();
</script>
