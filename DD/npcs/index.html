<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPCs</title>
    <style>
        :root {
            --bg: #1a1614;
            --surface: #231f1c;
            --border: #3d3530;
            --gold: #c9a84c;
            --accent: #c0392b;
            --text: #e8ddd0;
            --muted: #8a7d6e;
            --green: #5a8a5a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            font-family: 'Georgia', serif;
            min-height: 100vh;
        }

        /* ── Nav ── */
        .dd-nav {
            display: flex;
            gap: 0.75rem;
            padding: 0.75rem 1.25rem;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }
        .dd-nav a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0.3rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            transition: color 0.15s, border-color 0.15s;
        }
        .dd-nav a:hover { color: var(--gold); border-color: var(--gold); }

        /* ── Session strip ── */
        .sess-strip {
            display: flex;
            gap: 0.4rem;
            padding: 0.35rem 1.25rem;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            flex-wrap: nowrap;
            scrollbar-width: none;
        }
        .sess-strip::-webkit-scrollbar { display: none; }
        .sess-strip a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.75rem;
            padding: 0.2rem 0.55rem;
            border: 1px solid transparent;
            border-radius: 3px;
            white-space: nowrap;
            flex-shrink: 0;
            transition: color 0.15s, border-color 0.15s;
        }
        .sess-strip a:hover { color: var(--gold); border-color: var(--border); }

        /* ── Selector row ── */
        .selector-wrap {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 1rem;
            overflow-x: auto;
        }
        .selector {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* NPC thumb */
        .thumb {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            flex-shrink: 0;
            position: relative;
        }
        .thumb-img {
            position: relative;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--border);
            transition: border-color 0.15s, transform 0.15s;
            background: #2e2825;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .thumb:hover .thumb-img { border-color: var(--muted); transform: scale(1.05); }
        .thumb.active .thumb-img { border-color: var(--gold); box-shadow: 0 0 0 2px var(--gold); }
        .thumb-img img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        .thumb-name {
            font-size: 0.68rem;
            color: var(--muted);
            text-align: center;
            max-width: 70px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: color 0.15s;
        }
        .thumb.active .thumb-name { color: var(--gold); }
        .thumb-del {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--accent);
            border: none;
            color: #fff;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            font-size: 0.65rem;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .thumb:hover .thumb-del { display: flex; }

        /* Add button */
        .add-thumb {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            flex-shrink: 0;
        }
        .add-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px dashed var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 1.8rem;
            font-weight: 300;
            transition: border-color 0.15s, color 0.15s;
        }
        .add-thumb:hover .add-circle { border-color: var(--gold); color: var(--gold); }
        .add-label { font-size: 0.68rem; color: var(--muted); }

        /* ── Sheet ── */
        .sheet-wrap { max-width: 780px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
        .sheet { display: none; }
        .sheet.active { display: block; }

        .sheet-header {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px 6px 0 0;
            padding: 0.9rem 1.1rem;
            border-bottom: none;
        }
        .npc-name-display {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--gold);
            letter-spacing: 0.06em;
        }

        /* 2x2 grid */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 6px 6px;
            overflow: hidden;
        }
        .box {
            padding: 0.75rem 0.9rem;
            background: var(--surface);
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        .box:nth-child(even) { border-right: none; }
        .box:nth-last-child(-n+2) { border-bottom: none; }
        .box-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.13em;
            color: var(--muted);
            margin-bottom: 0.4rem;
        }
        .box textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: 'Georgia', serif;
            font-size: 0.88rem;
            line-height: 1.55;
            resize: none;
            outline: none;
            min-height: 120px;
        }
        .box textarea::placeholder { color: #4a403a; }
        .box-image {
            display: flex;
            flex-direction: column;
        }
        .box-image img {
            width: 100%;
            flex: 1;
            object-fit: contain;
            border-radius: 4px;
            min-height: 120px;
            max-height: 220px;
        }

        /* ── Modal ── */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.open { display: flex; }
        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.75rem;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .modal-title {
            font-size: 1.1rem;
            color: var(--gold);
            letter-spacing: 0.05em;
        }
        .modal-input {
            background: #2e2825;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            padding: 0.6rem 0.8rem;
            outline: none;
            width: 100%;
        }
        .modal-input:focus { border-color: var(--gold); }
        .modal-btns { display: flex; gap: 0.75rem; justify-content: flex-end; }
        .btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0.45rem 1.1rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
        }
        .btn:hover { opacity: 0.85; }
        .btn-ghost {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { color: var(--text); border-color: var(--muted); opacity: 1; }

        /* ── Save bar ── */
        .save-bar {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            font-size: 0.78rem;
            color: var(--muted);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.35rem 0.75rem;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }
        .save-bar.visible { opacity: 1; }
        .save-bar.saved { color: var(--green); }
    </style>
</head>
<body>

<nav class="dd-nav">
    <a href="/DD/index.html">Sessions</a>
    <a href="/DD/npcs/index.html">NPCs</a>
    <a href="/DD/players/players.html">Players</a>
    <a href="/DD/maps/">Maps</a>
</nav>

<div class="sess-strip" id="sess-strip"></div>

<div class="selector-wrap">
    <div class="selector" id="selector">
        <div class="add-thumb" onclick="openModal()">
            <div class="add-circle">+</div>
            <div class="add-label">Add NPC</div>
        </div>
    </div>
</div>

<div class="sheet-wrap" id="sheet-wrap"></div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-box">
        <div class="modal-title">New NPC</div>
        <input class="modal-input" id="modal-input" type="text" placeholder="NPC name…" />
        <div class="modal-btns">
            <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
            <button class="btn" onclick="createNPC()">Create</button>
        </div>
    </div>
</div>

<div class="save-bar" id="save-bar">saved</div>

<script>
    const API = '/DD/api.php?key=npc_cards';
    const FIELDS = ['abilities', 'weaknesses', 'notes'];

    async function loadData() {
        try { const r = await fetch(API); return r.ok ? r.json() : []; } catch { return []; }
    }
    async function storeData(data) {
        await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
    }

    let npcs = [];
    let saveTimer;

    function imgSrc(name) {
        return 'images/' + name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '') + '.png';
    }

    function markSaving() {
        const bar = document.getElementById('save-bar');
        bar.textContent = 'saving…';
        bar.className = 'save-bar visible';
        clearTimeout(saveTimer);
        saveTimer = setTimeout(async () => {
            await storeData(npcs);
            bar.textContent = 'saved';
            bar.className = 'save-bar visible saved';
            setTimeout(() => { bar.className = 'save-bar'; }, 1500);
        }, 600);
    }

    function selectNPC(id) {
        document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.sheet').forEach(s => s.classList.remove('active'));
        const thumb = document.querySelector(`.thumb[data-id="${id}"]`);
        const sheet = document.getElementById(`sheet-${id}`);
        if (thumb) thumb.classList.add('active');
        if (sheet) sheet.classList.add('active');
    }

    function makeThumb(npc) {
        const div = document.createElement('div');
        div.className = 'thumb';
        div.dataset.id = npc.id;
        div.onclick = () => selectNPC(npc.id);
        div.innerHTML = `
            <div class="thumb-img">
                <img src="${imgSrc(npc.name)}" onerror="this.src='images/placeholder.png'">
            </div>
            <div class="thumb-name">${npc.name}</div>
            <button class="thumb-del" title="Delete">✕</button>
        `;
        div.querySelector('.thumb-del').addEventListener('click', e => {
            e.stopPropagation();
            if (confirm(`Delete ${npc.name}?`)) {
                npcs = npcs.filter(n => n.id !== npc.id);
                markSaving();
                render();
            }
        });
        return div;
    }

    function makeSheet(npc) {
        const div = document.createElement('div');
        div.className = 'sheet';
        div.id = `sheet-${npc.id}`;
        div.innerHTML = `
            <div class="sheet-header">
                <div class="npc-name-display">${npc.name}</div>
            </div>
            <div class="grid">
                <div class="box">
                    <div class="box-label">Abilities</div>
                    <textarea data-field="abilities" placeholder="Powers, attacks, special abilities…"></textarea>
                </div>
                <div class="box">
                    <div class="box-label">Weaknesses</div>
                    <textarea data-field="weaknesses" placeholder="Vulnerabilities, damage types, conditions…"></textarea>
                </div>
                <div class="box">
                    <div class="box-label">Notes</div>
                    <textarea data-field="notes" placeholder="Behavior, tactics, lore…"></textarea>
                </div>
                <div class="box box-image">
                    <div class="box-label">Image</div>
                    <img src="${imgSrc(npc.name)}" onerror="this.src='images/placeholder.png'">
                </div>
            </div>
        `;

        FIELDS.forEach(f => {
            const el = div.querySelector(`[data-field="${f}"]`);
            if (el) {
                el.value = npc[f] || '';
                el.addEventListener('input', () => {
                    const n = npcs.find(x => x.id === npc.id);
                    if (n) n[f] = el.value;
                    markSaving();
                });
            }
        });

        return div;
    }

    function render(selectId) {
        const selector = document.getElementById('selector');
        const wrap = document.getElementById('sheet-wrap');

        // Clear existing thumbs (keep add button)
        selector.querySelectorAll('.thumb').forEach(el => el.remove());
        wrap.innerHTML = '';

        const addBtn = selector.querySelector('.add-thumb');

        npcs.forEach(npc => {
            selector.insertBefore(makeThumb(npc), addBtn);
            wrap.appendChild(makeSheet(npc));
        });

        if (selectId) {
            selectNPC(selectId);
        } else if (npcs.length > 0) {
            selectNPC(npcs[0].id);
        }
    }

    // Modal
    function openModal() {
        document.getElementById('modal-input').value = '';
        document.getElementById('modal').classList.add('open');
        setTimeout(() => document.getElementById('modal-input').focus(), 50);
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('open');
    }

    function createNPC() {
        const name = document.getElementById('modal-input').value.trim();
        if (!name) return;
        const id = Date.now().toString(36);
        npcs.push({ id, name, abilities: '', weaknesses: '', notes: '' });
        markSaving();
        closeModal();
        render(id);
    }

    // Close modal on backdrop click
    document.getElementById('modal').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeModal();
    });

    // Enter key in modal
    document.getElementById('modal-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') createNPC();
        if (e.key === 'Escape') closeModal();
    });

    // Session strip
    (async () => {
        try {
            const r = await fetch('/DD/api.php?key=sessions');
            const sessions = r.ok ? await r.json() : [];
            const strip = document.getElementById('sess-strip');
            sessions.forEach(s => {
                const a = document.createElement('a');
                a.href = `/DD/session.html?id=${s.id}`;
                a.textContent = s.title || `Session ${s.number}`;
                strip.appendChild(a);
            });
        } catch {}
    })();

    // Init
    (async () => {
        npcs = await loadData();
        render();
    })();
</script>

</body>
</html>
